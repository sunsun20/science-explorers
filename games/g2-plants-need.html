  .title .tag{color:var(--graphite);font-weight:700;font-size:1.05rem;margin:10px 0 4px}
  .how{display:flex;flex-direction:column;gap:8px;max-width:440px;margin:18px auto 6px;text-align:left}

  .lvl:active{transform:translateY(2px)}

  .win .score{font-family:var(--head);font-weight:700;font-size:1.4rem;color:var(--charcoal);margin:12px 0}

  .confetti{position:fixed;top:-44px;z-index:95;pointer-events:none;will-change:transform,opacity;animation:fall linear forwards}
  .choice{animation:pop .3s both}

  $('titleEmoji').textContent=GAME.emoji||'🔬';
  var how=$('howList'); (GAME.how||[{e:'👆',t:'Tap the right answer.'},{e:'🏅',t:'Earn points for every correct round.'},{e:'🥉',t:'Beat Bronze, Silver and Gold!'}]).forEach(function(h){var d=document.createElement('div');d.innerHTML='<b>'+h.e+'</b>'+h.t;how.appendChild(d)});

  window.show=function(id){['sTitle','sLevel','sPlay','sWin'].forEach(function(s){$(s).classList.toggle('live',s===id)});window.scrollTo(0,0)};
  function best(lvl){try{return +localStorage.getItem(LKEY+'_'+lvl)||0}catch(e){return 0}}
  function setBest(lvl,v){try{if(v>best(lvl))localStorage.setItem(LKEY+'_'+lvl,v)}catch(e){}}

  function renderLevels(){
    var box=$('levelCards');box.innerHTML='';
    LEVELS.forEach(function(L){
      var key=L[0];var card=document.createElement('button');card.className='lvl '+key[0];
      var b=best(key);
      card.innerHTML='<div class="medal">'+L[1]+'</div><h3>'+L[2]+'</h3><div class="desc">'+L[3]+'</div>'+
        '<div class="best">'+(b?('★ Best: '+b+' pts'):'Not played yet')+'</div>';
      card.addEventListener('click',function(){playLevel(key)});
      box.appendChild(card);
    });
  }
  function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

  function playLevel(lvl){curLevel=lvl;rounds=(GAME.levels&&GAME.levels[lvl])||[];total=rounds.length;idx=0;stars=0;points=0;show('sPlay');render()}
  function progress(){$('barFill').style.width=Math.round(idx/Math.max(1,total)*100)+'%';$('starCount').textContent='⭐ '+stars;$('ptsCount').textContent='🏅 '+points}
  function award(){stars++;points+=10;progress()}

  function render(){
    progress();var r=rounds[idx];
    $('qText').textContent=r.q;
    var sh=$('qShow');
    if(r.type==='order'){sh.innerHTML='';sh.style.display='none';}
    else if(r.show){sh.style.display='';sh.innerHTML=r.show;}
    else{sh.style.display='none';sh.textContent='';}
    $('toast').textContent='';$('toast').className='toast';$('playActions').innerHTML='';
    var slots=$('slots');slots.style.display='none';slots.innerHTML='';
    var box=$('choices');box.innerHTML='';box.style.display='';
    if(r.type==='one')renderOne(r,box);else if(r.type==='all')renderAll(r,box);else if(r.type==='order')renderOrder(r,box,slots);
  }
  function next(){idx++;if(idx>=total){finish()}else{render()}}

  function renderOne(r,box){
    shuffle(r.choices).forEach(function(c){
      var el=document.createElement('button');el.className='choice';
      el.innerHTML='<span class="ce">'+c.e+'</span><span class="ct">'+c.t+'</span>';
      el.addEventListener('click',function(){
        if(el.classList.contains('right'))return;
        if(c.ok){el.classList.add('right');award();yay();$('toast').textContent='Yes! 🎉';$('toast').className='toast good';
          Array.prototype.forEach.call(box.children,function(b){b.style.pointerEvents='none'});setTimeout(next,780);}
        else{el.classList.add('wrong');nope();$('toast').textContent='Try again 🙂';$('toast').className='toast try';setTimeout(function(){el.classList.remove('wrong')},400);}
      });box.appendChild(el);
    });
  }
  function renderAll(r,box){
    shuffle(r.choices).forEach(function(c){
      var el=document.createElement('button');el.className='choice';el._ok=!!c.ok;el._sel=false;
      el.innerHTML='<span class="ce">'+c.e+'</span><span class="ct">'+c.t+'</span>';
      el.addEventListener('click',function(){if(el.classList.contains('right'))return;el._sel=!el._sel;el.classList.toggle('sel',el._sel)});box.appendChild(el);
    });
    var check=document.createElement('button');check.className='btn';check.textContent='✓ Check';
    check.addEventListener('click',function(){
      var ok=true;Array.prototype.forEach.call(box.children,function(b){if(!!b._sel!==!!b._ok)ok=false});
      if(ok){Array.prototype.forEach.call(box.children,function(b){if(b._ok)b.classList.add('right')});award();yay();$('toast').textContent='Perfect! 🎉';$('toast').className='toast good';check.style.display='none';setTimeout(next,900);}
      else{nope();$('toast').textContent='Almost — check again 🙂';$('toast').className='toast try';Array.prototype.forEach.call(box.children,function(b){if(b._sel&&!b._ok){b.classList.add('wrong');(function(x){setTimeout(function(){x.classList.remove('wrong')},400)})(b)}});}
    });$('playActions').appendChild(check);
  }
  function renderOrder(r,box,slots){
    slots.style.display='flex';var picked=[];
    r.items.forEach(function(_,i){var s=document.createElement('div');s.className='slot';s.innerHTML='<span class="n">'+(i+1)+'</span>';slots.appendChild(s)});
    function redraw(){Array.prototype.forEach.call(slots.children,function(s,i){var n=s.querySelector('.n');s.textContent='';s.appendChild(n);if(picked[i]!=null)s.insertAdjacentText('beforeend',r.items[picked[i]].e)})}
    shuffle(r.items.map(function(_,i){return i})).forEach(function(origIndex){
      var c=r.items[origIndex];var el=document.createElement('button');el.className='choice';
      el.innerHTML='<span class="ce">'+c.e+'</span><span class="ct">'+c.t+'</span>';
      el.addEventListener('click',function(){
        if(el.disabled)return;el.disabled=true;el.classList.add('sel');picked.push(origIndex);redraw();
        if(picked.length===r.items.length){
          var ok=picked.every(function(v,i){return v===i});
          if(ok){award();yay();$('toast').textContent='Great order! 🎉';$('toast').className='toast good';setTimeout(next,950);}
          else{nope();$('toast').textContent='Not quite — try again 🙂';$('toast').className='toast try';setTimeout(function(){picked=[];redraw();Array.prototype.forEach.call(box.children,function(b){b.disabled=false;b.classList.remove('sel')})},900);}
        }
      });box.appendChild(el);
    });
  }
  function finish(){
    idx=total;progress();setBest(curLevel,points);
    var pct=Math.round(stars/Math.max(1,total)*100);var st=pct>=90?3:pct>=60?2:1;
    $('winStars').textContent='⭐⭐⭐'.slice(0,st)+'☆☆☆'.slice(0,3-st);
    var medal=curLevel==='bronze'?'🥉':curLevel==='silver'?'🥈':'🥇';
    $('winEmoji').textContent=st===3?'🏆':medal;
    $('winTitle').textContent=(curLevel.charAt(0).toUpperCase()+curLevel.slice(1))+' Complete!';
    $('winScore').textContent='You scored '+points+' points  ·  '+stars+' of '+total+' rounds!';
    var wa=$('winActions');wa.innerHTML='';
    var order=['bronze','silver','gold'],ni=order.indexOf(curLevel)+1;
    if(ni<order.length){var nx=document.createElement('button');nx.className='btn green';nx.textContent='▶ '+order[ni].charAt(0).toUpperCase()+order[ni].slice(1)+' level';nx.addEventListener('click',function(){playLevel(order[ni])});wa.appendChild(nx);}
    var ag=document.createElement('button');ag.className='btn';ag.textContent='↺ Play again';ag.addEventListener('click',function(){playLevel(curLevel)});wa.appendChild(ag);
    var mn=document.createElement('button');mn.className='btn ghost';mn.textContent='🎖 Levels';mn.addEventListener('click',function(){renderLevels();show('sLevel')});wa.appendChild(mn);
    show('sWin');fanfare();
  }
  $('startBtn').addEventListener('click',function(){renderLevels();show('sLevel')});
})();
</script>
</body>
</html>
