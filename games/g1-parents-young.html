<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Baby Match! — Science Explorers</title>
<!--
  ============================================================================
  SCIENCE EXPLORERS — GRADE GAME TEMPLATE  (self-contained, offline, English)
  To make another game, change ONLY these 4 things:
    1) <title>                         2) the :root THEME colour block
    3) the .unit-pill text + brand     4) the GAME object in <script>
  The engine supports 3 round types:  'one' (tap the 1 right answer),
    'all' (tap every right answer, then Check),  'order' (tap in order).
  Keep it Grade-appropriate: short words, big pictures, gentle retries.
  ============================================================================
-->
<style>
  :root{
    /* ---- THEME (clone: change these 5) — Unit 3 = PINK ---- */
    --main:#e64980; --main-d:#c2255c; --tint:#fff0f6; --line:#ffdeeb; --text-c:#a61e4d;

    /* ---- shared Duolingo brand tokens (do not change) ---- */
    --duo:#58cc02; --sky:#1cb0f6; --ink:#3c3c3c; --charcoal:#4b4b4b;
    --graphite:#777; --cloud:#e5e5e5; --snow:#fff;
    --good:#58cc02; --good-d:#46a302; --bad:#ff7a7a;
    --head:'Fredoka','Baloo 2','Comic Sans MS','Trebuchet MS',system-ui,sans-serif;
    --body:'Nunito Sans','Varela Round','Trebuchet MS',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--body);color:var(--ink);min-height:100vh;overflow-x:hidden;
    -webkit-text-size-adjust:100%;
    background:
      radial-gradient(1200px 520px at 50% -8%, var(--tint) 0%, rgba(255,255,255,0) 60%),
      radial-gradient(900px 460px at 92% 4%, #fff7d6 0%, rgba(255,247,214,0) 55%),
      var(--snow);
  }
  h1,h2,h3{font-family:var(--head);font-weight:700;margin:0;line-height:1.15;letter-spacing:-.01em}
  .app{max-width:760px;margin:0 auto;padding:0 16px 40px}

  /* ===== top bar ===== */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    padding:12px 0 10px;background:linear-gradient(180deg,var(--snow) 72%,rgba(255,255,255,0))}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--head);font-weight:700;color:var(--main);font-size:1.12rem;white-space:nowrap}
  .brand .logo{width:38px;height:38px;border-radius:12px;background:var(--main);box-shadow:0 4px 0 var(--main-d);display:grid;place-items:center;font-size:1.25rem}
  .unit-pill{display:inline-flex;align-items:center;gap:5px;background:var(--tint);color:var(--text-c);
    border:1px solid var(--line);font-weight:800;font-size:.74rem;padding:5px 12px;border-radius:99px;
    letter-spacing:.03em;white-space:nowrap}
  .spacer{flex:1 1 8px}
  .iconbtn{width:44px;height:44px;min-width:44px;border-radius:12px;border:2px solid var(--cloud);
    background:#fff;color:var(--charcoal);font-size:1.18rem;cursor:pointer;display:grid;place-items:center;
    transition:transform .08s,background .15s,border-color .15s}
  .iconbtn:hover{background:#fafafa;border-color:var(--line)}
  .iconbtn:active{transform:translateY(2px)}
  .iconbtn.off{opacity:.6}
  .restart-btn{height:38px;border-radius:12px;border:2px solid var(--line);
    background:var(--tint);color:var(--text-c);font-family:var(--head);font-weight:800;font-size:.76rem;
    cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:0 12px;white-space:nowrap;
    transition:transform .08s,background .15s}
  .restart-btn:hover{filter:brightness(.96)}
  .restart-btn:active{transform:translateY(2px)}

  /* ===== progress + stars ===== */
  .hud{display:flex;align-items:center;gap:12px;margin:6px 0 18px}
  .bar{flex:1;height:16px;border-radius:99px;background:#eee;overflow:hidden;border:1px solid var(--cloud)}
  .bar>i{display:block;height:100%;width:0;background:var(--good);border-radius:99px;transition:width .35s ease}
  .stars{font-weight:800;color:var(--text-c);white-space:nowrap;font-family:var(--head)}

  /* ===== generic card / screens ===== */
  .screen{display:none;animation:pop .25s ease}
  .screen.live{display:block}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .panel{background:#fff;border:3px solid var(--line);border-radius:24px;padding:26px 22px;box-shadow:0 8px 0 var(--tint);text-align:center}

  /* ===== title screen ===== */
  .title-emoji{font-size:5rem;line-height:1;margin:4px 0 6px;animation:float 4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .title h1{font-size:clamp(30px,7vw,46px);color:var(--text-c)}
  .title .tag{color:var(--graphite);font-weight:700;font-size:1.05rem;margin:10px 0 4px}
  .how{display:flex;flex-direction:column;gap:8px;max-width:420px;margin:18px auto 6px;text-align:left}
  .how div{background:var(--tint);border-radius:14px;padding:11px 15px;font-weight:700;color:var(--charcoal);font-size:.98rem}
  .how div b{font-size:1.2rem;margin-right:6px}

  /* ===== big pressable button ===== */
  .btn{font-family:var(--head);font-weight:700;font-size:1.22rem;color:#fff;background:var(--main);
    border:none;border-radius:18px;padding:15px 30px;box-shadow:0 6px 0 var(--main-d);cursor:pointer;
    display:inline-flex;align-items:center;gap:10px;letter-spacing:.3px;transition:transform .06s}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--main-d)}
  .btn.green{background:var(--good);box-shadow:0 6px 0 var(--good-d)}
  .btn.green:active{box-shadow:0 2px 0 var(--good-d)}
  .btn.ghost{background:#fff;color:var(--text-c);border:3px solid var(--line);box-shadow:0 6px 0 var(--tint)}
  .btn.ghost:active{box-shadow:0 2px 0 var(--tint)}

  /* ===== question ===== */
  .q{font-family:var(--head);font-size:clamp(20px,4.6vw,28px);color:var(--ink);margin:4px 8px 6px;line-height:1.25}
  .show{font-size:4.2rem;line-height:1.1;margin:4px 0 10px}
  .show .seq{display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:3rem}
  .show .seq .qmark{opacity:.5}

  /* ===== choices grid ===== */
  .choices{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));margin:18px 0 6px}
  .choice{background:#fff;border:3px solid var(--cloud);border-radius:20px;padding:18px 10px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:8px;min-height:118px;justify-content:center;
    transition:transform .08s,border-color .12s,background .12s;box-shadow:0 5px 0 #eee;box-sizing:border-box}
  .choice:hover{border-color:var(--line);transform:translateY(-2px)}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #eee}
  .choice .ce{font-size:3rem;line-height:1;flex-shrink:0}
  .choice .ct{font-family:var(--head);font-weight:700;font-size:clamp(0.72rem,2vw,1.1rem);color:var(--charcoal);overflow-wrap:break-word;word-break:normal;hyphens:auto;text-align:center;width:100%;line-height:1.3}
  .choice.sel{border-color:var(--sky);background:#eaf8ff;box-shadow:0 5px 0 #cfeeff}
  .choice.right{border-color:var(--good);background:#eaffd6;box-shadow:0 5px 0 #c7f0a0;animation:bounce .4s}
  .choice.wrong{border-color:var(--bad);background:#ffecec;box-shadow:0 5px 0 #ffd0d0;animation:shake .35s}
  @keyframes bounce{0%,100%{transform:none}40%{transform:translateY(-8px)}}
  @keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

  /* order slots */
  .slots{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0 16px;min-height:96px}
  .slot{width:84px;height:84px;border-radius:18px;border:3px dashed var(--line);background:var(--tint);
    display:grid;place-items:center;font-size:2.6rem;position:relative}
  .slot .n{position:absolute;top:-10px;left:-8px;width:26px;height:26px;border-radius:50%;background:var(--main);
    color:#fff;font-family:var(--head);font-weight:700;font-size:.82rem;display:grid;place-items:center}

  /* feedback toast */
  .toast{min-height:34px;margin:8px 0 2px;font-family:var(--head);font-weight:700;font-size:1.25rem}
  .toast.good{color:var(--good-d)}
  .toast.try{color:#e8590c}

  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}

  /* win screen */
  .win-emoji{font-size:5rem;animation:bounce 1s infinite}
  .win h1{font-size:clamp(28px,6vw,42px);color:var(--text-c);margin-top:6px}
  .win .score{font-family:var(--head);font-weight:700;font-size:1.4rem;color:var(--charcoal);margin:12px 0}
  .win .starline{font-size:2rem;letter-spacing:4px;margin:6px 0 14px}

  /* credit footer */
  footer.credit{max-width:760px;margin:24px auto 30px;padding:16px 22px;background:#f4f5f8;border:1px solid #e8eaf1;
    border-radius:20px;text-align:center;font-family:var(--head);color:#5b6472;font-weight:700;line-height:1.55;font-size:.92rem}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:480px){.choice .ce{font-size:2.5rem}.title-emoji{font-size:4rem}}

  /* ===== extra cute animations ===== */
  @keyframes wiggle{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.07)}}
  @keyframes popIn{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  @keyframes pulseGlow{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
  @keyframes tada{0%{transform:scale(1)}20%{transform:scale(1.25) rotate(8deg)}40%{transform:scale(1.25) rotate(-8deg)}60%{transform:scale(1.2) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(400deg);opacity:.85}}
  .title-emoji{animation:wiggle 2.4s ease-in-out infinite!important}
  .show{display:inline-block;animation:wiggle 2.1s ease-in-out infinite}
  .win-emoji{animation:pulseGlow .8s ease-in-out infinite!important}
  .choice{animation:popIn .34s cubic-bezier(.34,1.56,.64,1) both}
  .choice:nth-child(2){animation-delay:.05s}.choice:nth-child(3){animation-delay:.1s}.choice:nth-child(4){animation-delay:.15s}.choice:nth-child(5){animation-delay:.2s}
  .choice .ce{transition:transform .15s}
  .choice:hover .ce{transform:scale(1.18) rotate(-4deg)}
  .choice.right .ce{animation:tada .6s}
  .confetti{position:fixed;top:-44px;z-index:95;pointer-events:none;will-change:transform,opacity;animation:fall linear forwards}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand"><span class="logo">🐤</span><span>Science Explorers</span></div>
    <span class="unit-pill">🐤 Grade 1 · Unit 3 · Parents &amp; Young</span>
    <span class="spacer"></span>
    <button class="iconbtn" id="homeBtn" title="Back to menu" aria-label="Back to games menu" onclick="if(confirm('Leave the game and go back to the menu?')){window.location.href='index.html';}">🏠</button>
    <button class="restart-btn" id="restartBtn" title="Restart game — return to title" aria-label="Restart game" onclick="location.reload()">🏠 Restart</button>
    <button class="iconbtn" id="muteBtn" aria-pressed="false" title="Sound on / off" aria-label="Toggle sound">🔊</button>
  </header>

  <!-- TITLE -->
  <section class="screen live" id="sTitle">
    <div class="panel title">
      <div class="title-emoji" id="titleEmoji">🐤</div>
      <h1 id="titleName">Baby Match!</h1>
      <div class="tag" id="titleTag">Match each baby to its grown-up — and seeds to their plant!</div>
      <div class="how" id="howList"></div>
      <div class="actions"><button class="btn green" id="startBtn">▶ Play</button></div>
    </div>
  </section>

  <!-- PLAY -->
  <section class="screen" id="sPlay">
    <div class="hud">
      <div class="bar"><i id="barFill"></i></div>
      <div class="stars" id="starCount">⭐ 0</div>
    </div>
    <div class="panel">
      <div class="q" id="qText"></div>
      <div class="show" id="qShow"></div>
      <div class="slots" id="slots" style="display:none"></div>
      <div class="choices" id="choices"></div>
      <div class="toast" id="toast"></div>
      <div class="actions" id="playActions"></div>
    </div>
  </section>

  <!-- WIN -->
  <section class="screen" id="sWin">
    <div class="panel win">
      <div class="win-emoji">🎉</div>
      <h1>You did it!</h1>
      <div class="starline" id="winStars"></div>
      <div class="score" id="winScore"></div>
      <div class="actions">
        <button class="btn green" id="againBtn">↺ Play again</button>
        <button class="btn ghost" onclick="window.location.href='index.html'">🏠 Menu</button>
      </div>
    </div>
  </section>

  <footer class="credit">
    <div>Science Explorers · A Grades 1–5 science classroom by Deenish Ramdial</div>
    <div>© 2026 Deenish Ramdial · All rights reserved.</div>
  </footer>
</div>

<script>
"use strict";
/* ===================== GAME CONFIG (clone: edit this object) ===================== */
var GAME = {
  emoji:"🐤", name:"Baby Match!",
  tag:"Match each baby to its grown-up — and seeds to their plant!",
  how:[{e:"👆",t:"Tap the grown-up for each baby."},{e:"🌱",t:"Match seeds to the plant they grow into."},{e:"⭐",t:"Get a star for every round you finish!"}],
  rounds:[
    {type:"one",q:"Which is the chick's grown-up?",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="chick"><ellipse cx="32" cy="40" rx="18" ry="16" fill="#ffd94a"/><circle cx="32" cy="22" r="13" fill="#ffe066"/><circle cx="27" cy="21" r="2.4" fill="#2b2b2b"/><circle cx="37" cy="21" r="2.4" fill="#2b2b2b"/><path d="M29 25 l6 0 l-3 4 z" fill="#f5a623"/><path d="M16 41 l-6 3 l6 3 M48 41 l6 3 l-6 3" fill="#ffcf33"/></svg>',choices:[{e:"🐔",t:"Hen",ok:true},{e:"🐶",t:"Dog"},{e:"🐟",t:"Fish"}]},
    {type:"one",q:"Which is the kitten's grown-up?",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="kitten"><path d="M17 13 l8 16 l-14 1 z" fill="#cf9a52"/><path d="M47 13 l-8 16 l14 1 z" fill="#cf9a52"/><circle cx="32" cy="36" r="18" fill="#e0b878"/><circle cx="25" cy="34" r="2.4" fill="#2b2b2b"/><circle cx="39" cy="34" r="2.4" fill="#2b2b2b"/><path d="M30 39 q2 2 4 0" stroke="#7a5a2a" stroke-width="1.6" fill="none"/><path d="M20 37 h-9 M20 41 h-9 M44 37 h9 M44 41 h9" stroke="#b08a44" stroke-width="1.2"/></svg>',choices:[{e:"🐈",t:"Cat",ok:true},{e:"🐑",t:"Sheep"},{e:"🐦",t:"Bird"}]},
    {type:"one",q:"Which is the puppy's grown-up?",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="puppy"><ellipse cx="14" cy="32" rx="7" ry="14" fill="#a9743f"/><ellipse cx="50" cy="32" rx="7" ry="14" fill="#a9743f"/><circle cx="32" cy="34" r="18" fill="#c9925a"/><circle cx="25" cy="32" r="2.6" fill="#2b2b2b"/><circle cx="39" cy="32" r="2.6" fill="#2b2b2b"/><ellipse cx="32" cy="41" rx="4.5" ry="3.2" fill="#4a3526"/><path d="M32 44 v3" stroke="#4a3526" stroke-width="1.6"/></svg>',choices:[{e:"🐕",t:"Dog",ok:true},{e:"🐔",t:"Hen"},{e:"🐸",t:"Frog"}]},
    {type:"one",q:"Which is the lamb's grown-up?",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="lamb"><g fill="#f4f4f4"><circle cx="20" cy="26" r="9"/><circle cx="32" cy="20" r="9"/><circle cx="44" cy="26" r="9"/><circle cx="18" cy="38" r="8"/><circle cx="46" cy="38" r="8"/><circle cx="32" cy="44" r="9"/></g><ellipse cx="32" cy="35" rx="12" ry="13" fill="#3a3a3a"/><ellipse cx="22" cy="31" rx="5" ry="3.5" fill="#2b2b2b"/><ellipse cx="42" cy="31" rx="5" ry="3.5" fill="#2b2b2b"/><circle cx="27" cy="35" r="2.2" fill="#fff"/><circle cx="37" cy="35" r="2.2" fill="#fff"/></svg>',choices:[{e:"🐏",t:"Sheep",ok:true},{e:"🐈",t:"Cat"},{e:"🦆",t:"Duck"}]},
    {type:"one",q:"Which is the calf's grown-up?",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="calf"><ellipse cx="14" cy="24" rx="6" ry="4.5" fill="#caa472"/><ellipse cx="50" cy="24" rx="6" ry="4.5" fill="#caa472"/><circle cx="32" cy="35" r="18" fill="#d9b48a"/><path d="M23 24 q-7 -7 -13 -4 q4 6 13 7 z" fill="#a9743f"/><path d="M41 24 q7 -7 13 -4 q-4 6 -13 7 z" fill="#a9743f"/><circle cx="25" cy="32" r="2.6" fill="#2b2b2b"/><circle cx="39" cy="32" r="2.6" fill="#2b2b2b"/><ellipse cx="32" cy="43" rx="10" ry="7" fill="#f0c0c8"/><circle cx="29" cy="43" r="1.5" fill="#b97f8a"/><circle cx="35" cy="43" r="1.5" fill="#b97f8a"/></svg>',choices:[{e:"🐄",t:"Cow",ok:true},{e:"🐑",t:"Sheep"},{e:"🐔",t:"Hen"}]},
    {type:"one",q:"Which is the duckling's grown-up?",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="duckling"><ellipse cx="29" cy="40" rx="19" ry="15" fill="#ffe066"/><circle cx="43" cy="27" r="12" fill="#ffe066"/><circle cx="46" cy="25" r="2.3" fill="#2b2b2b"/><path d="M53 27 l8 1 l-8 4 z" fill="#f5a623"/><path d="M12 41 q-6 2 -2 7" stroke="#ffcf33" stroke-width="5" fill="none" stroke-linecap="round"/></svg>',choices:[{e:"🦆",t:"Duck",ok:true},{e:"🐈",t:"Cat"},{e:"🐕",t:"Dog"}]},
    {type:"one",q:"A baby camel grows up to look like its parent — a big…",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="camel"><path d="M6 50 q1 -15 9 -15 q2 -11 6 -1 q3 -12 7 -1 q8 0 9 17 l-5 0 q-1 -8 -3 -8 q-3 0 -3 8 z" fill="#cfa05e"/><path d="M34 36 q8 -1 11 -12 q4 3 1 10 q4 2 3 7 l-7 5 q-4 -1 -8 -3 z" fill="#cfa05e"/><circle cx="48" cy="29" r="1.6" fill="#2b2b2b"/><path d="M13 50 v6 M21 50 v6 M29 50 v6 M44 51 v5" stroke="#b8884a" stroke-width="3" stroke-linecap="round"/></svg>',choices:[{e:"🐫",t:"Camel",ok:true},{e:"🐠",t:"Fish"},{e:"🦋",t:"Butterfly"}]},
    {type:"one",q:"A sunflower SEED grows into a…",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="seed"><ellipse cx="32" cy="40" rx="14" ry="18" fill="#c98a4a"/><path d="M18 28 q14 -10 28 0 q0 6 -14 6 q-14 0 -14 -6 z" fill="#8a5a2b"/><circle cx="32" cy="20" r="3" fill="#6b4422"/><path d="M26 38 q6 6 12 0" stroke="#a06a30" stroke-width="1.4" fill="none"/></svg>',choices:[{e:"🌻",t:"Sunflower",ok:true},{e:"🐱",t:"Cat"},{e:"🐟",t:"Fish"}]},
    {type:"one",q:"An apple seed grows into an…",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="apple"><path d="M32 18 C24 10 14 16 16 28 C12 40 20 54 32 54 C44 54 52 40 48 28 C50 16 40 10 32 18 Z" fill="#e23b3b"/><path d="M32 18 q2 -8 9 -9 q-1 7 -7 9 z" fill="#3fa34d"/><path d="M31 18 q-3 -6 -7 -5" stroke="#7a4a1e" stroke-width="2.5" fill="none" stroke-linecap="round"/><ellipse cx="24" cy="30" rx="4" ry="6" fill="#fff" opacity="0.25"/></svg>',choices:[{e:"🌳",t:"Apple tree",ok:true},{e:"🐦",t:"Bird"},{e:"⭐",t:"Star"}]},
    {type:"one",q:"Young animals look like their parents, but…",show:'<svg viewBox="0 0 64 64" width="1.2em" height="1.2em" role="img" aria-label="parent and child"><circle cx="22" cy="19" r="9" fill="#f0b98a"/><path d="M8 52 q0 -16 14 -16 q14 0 14 16 z" fill="#5aa9e6"/><circle cx="45" cy="29" r="7" fill="#f0b98a"/><path d="M34 52 q0 -12 11 -12 q11 0 11 12 z" fill="#f59f3a"/></svg>',choices:[{e:"🙂",t:"Not exactly the same",ok:true},{e:"👯",t:"Exactly the same"}]}
  ]
};
/* ============================ ENGINE (do not change) ============================ */
(function(){
  var idx=0, stars=0, rounds=GAME.rounds, total=rounds.length;
  var $=function(id){return document.getElementById(id)};

  /* ---- audio ---- */
  var muted=false,ac=null;
  try{muted=localStorage.getItem('sx_muted')==='1'}catch(e){}
  function ctx(){if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){ac=null}}return ac}
  function blip(f,d){if(muted)return;var a=ctx();if(!a)return;if(a.state==='suspended'){try{a.resume()}catch(e){}}
    try{var o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(f,a.currentTime);
      g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(.16,a.currentTime+.012);
      g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(g);g.connect(a.destination);
      o.start();o.stop(a.currentTime+d+.02)}catch(e){}}
  function yay(){blip(523.25,.10);setTimeout(function(){blip(783.99,.14)},90);confetti(10)}
  function nope(){blip(196,.18)}
  function win(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){blip(f,.16)},i*120)});confetti(60)}
  function confetti(n){var chars=['✦','◆','◇','✧','⬟','✴','⬡','✸'];var golds=['#E0A800','#F5C518','#D4A017','#C9A227','#B8860B','#FFD700','#FFC125','#DAA520'];for(var i=0;i<n;i++){(function(){var s=document.createElement('div');s.className='confetti';s.textContent=chars[Math.floor(Math.random()*chars.length)];s.style.color=golds[Math.floor(Math.random()*golds.length)];s.style.left=(Math.random()*100)+'vw';s.style.fontSize=(12+Math.random()*16)+'px';s.style.animationDuration=(1.3+Math.random()*1.3)+'s';s.style.animationDelay=(Math.random()*0.25)+'s';document.body.appendChild(s);setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s)},2800)})()}}

  var mute=$('muteBtn');
  function renderMute(){mute.textContent=muted?'🔇':'🔊';mute.classList.toggle('off',muted);mute.setAttribute('aria-pressed',muted?'true':'false')}
  renderMute();
  mute.addEventListener('click',function(){muted=!muted;try{localStorage.setItem('sx_muted',muted?'1':'0')}catch(e){}renderMute();if(!muted)blip(660,.1)});

  /* ---- title ---- */
  $('titleEmoji').textContent=GAME.emoji;
  $('titleName').textContent=GAME.name;
  $('titleTag').textContent=GAME.tag;
  var how=$('howList');how.innerHTML='';
  GAME.how.forEach(function(h){var d=document.createElement('div');d.innerHTML='<b>'+h.e+'</b>'+h.t;how.appendChild(d)});

  function show(id){['sTitle','sPlay','sWin'].forEach(function(s){$(s).classList.toggle('live',s===id)});window.scrollTo(0,0)}

  function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

  function start(){idx=0;stars=0;show('sPlay');render()}
  function progress(){$('barFill').style.width=Math.round(idx/total*100)+'%';$('starCount').textContent='⭐ '+stars}

  function render(){
    progress();
    var r=rounds[idx];
    $('qText').textContent=r.q;
    var sh=$('qShow');
    if(r.type==='order'){sh.innerHTML='';sh.style.display='none';}
    else if(r.show){sh.style.display='';sh.innerHTML=r.show;}
    else{sh.style.display='none';sh.textContent='';}
    $('toast').textContent='';$('toast').className='toast';
    $('playActions').innerHTML='';
    var slots=$('slots');slots.style.display='none';slots.innerHTML='';
    var box=$('choices');box.innerHTML='';box.style.display='';

    if(r.type==='one'){renderOne(r,box);}
    else if(r.type==='all'){renderAll(r,box);}
    else if(r.type==='order'){renderOrder(r,box,slots);}
  }

  function next(){idx++;if(idx>=total){finish()}else{render()}}
  function award(){stars++;progress()}

  /* ---- type: one ---- */
  function renderOne(r,box){
    shuffle(r.choices).forEach(function(c){
      var el=document.createElement('button');el.className='choice';
      el.innerHTML='<span class="ce">'+c.e+'</span><span class="ct">'+c.t+'</span>';
      el.addEventListener('click',function(){
        if(el.classList.contains('right'))return;
        if(c.ok){el.classList.add('right');award();yay();$('toast').textContent='Yes! 🎉';$('toast').className='toast good';
          Array.prototype.forEach.call(box.children,function(b){b.style.pointerEvents='none'});
          setTimeout(next,800);}
        else{el.classList.add('wrong');nope();$('toast').textContent='Try again 🙂';$('toast').className='toast try';
          setTimeout(function(){el.classList.remove('wrong')},400);}
      });
      box.appendChild(el);
    });
  }

  /* ---- type: all ---- */
  function renderAll(r,box){
    shuffle(r.choices).forEach(function(c){
      var el=document.createElement('button');el.className='choice';el._ok=!!c.ok;el._sel=false;
      el.innerHTML='<span class="ce">'+c.e+'</span><span class="ct">'+c.t+'</span>';
      el.addEventListener('click',function(){if(el.classList.contains('right'))return;el._sel=!el._sel;el.classList.toggle('sel',el._sel)});
      box.appendChild(el);
    });
    var check=document.createElement('button');check.className='btn';check.textContent='✓ Check';
    check.addEventListener('click',function(){
      var ok=true;
      Array.prototype.forEach.call(box.children,function(b){if(!!b._sel!==!!b._ok)ok=false});
      if(ok){Array.prototype.forEach.call(box.children,function(b){if(b._ok)b.classList.add('right')});
        award();yay();$('toast').textContent='Perfect! 🎉';$('toast').className='toast good';
        check.style.display='none';setTimeout(next,900);}
      else{nope();$('toast').textContent='Almost — check again 🙂';$('toast').className='toast try';
        Array.prototype.forEach.call(box.children,function(b){if(b._sel&&!b._ok){b.classList.add('wrong');(function(x){setTimeout(function(){x.classList.remove('wrong')},400)})(b)}});}
    });
    $('playActions').appendChild(check);
  }

  /* ---- type: order ---- */
  function renderOrder(r,box,slots){
    slots.style.display='flex';
    var picked=[];
    r.items.forEach(function(_,i){var s=document.createElement('div');s.className='slot';s.innerHTML='<span class="n">'+(i+1)+'</span>';slots.appendChild(s)});
    function redraw(){Array.prototype.forEach.call(slots.children,function(s,i){var n=s.querySelector('.n');s.textContent='';s.appendChild(n);if(picked[i]!=null)s.insertAdjacentText('beforeend',r.items[picked[i]].e)})}
    shuffle(r.items.map(function(_,i){return i})).forEach(function(origIndex){
      var c=r.items[origIndex];
      var el=document.createElement('button');el.className='choice';
      el.innerHTML='<span class="ce">'+c.e+'</span><span class="ct">'+c.t+'</span>';
      el.addEventListener('click',function(){
        if(el.disabled)return;el.disabled=true;el.classList.add('sel');picked.push(origIndex);redraw();
        if(picked.length===r.items.length){
          var ok=picked.every(function(v,i){return v===i});
          if(ok){award();yay();$('toast').textContent='Great order! 🎉';$('toast').className='toast good';setTimeout(next,950);}
          else{nope();$('toast').textContent='Not quite — try again 🙂';$('toast').className='toast try';
            setTimeout(function(){picked=[];redraw();Array.prototype.forEach.call(box.children,function(b){b.disabled=false;b.classList.remove('sel')})},900);}
        }
      });
      box.appendChild(el);
    });
  }

  function finish(){
    idx=total;progress();
    var pct=Math.round(stars/total*100);
    var s=pct>=90?3:pct>=60?2:1;
    $('winStars').textContent='⭐⭐⭐'.slice(0,s)+'☆☆☆'.slice(0,3-s);
    $('winScore').textContent='You finished '+stars+' of '+total+' rounds!';
    show('sWin');win();
  }

  $('startBtn').addEventListener('click',start);
  $('againBtn').addEventListener('click',start);
})();
</script>
</body>
</html>
