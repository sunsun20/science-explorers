<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Science Explorers</title>
<!-- Comic Sans MS (local) with self-hosted Comic Neue fallback (works offline) -->
<style>
  @font-face{font-family:'Comic Neue';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/ComicNeue-400.woff2') format('woff2');}
  @font-face{font-family:'Comic Neue';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/ComicNeue-700.woff2') format('woff2');}
  :root{
    --ink:#1f2a37; --muted:#5b6877; --line:#e4e8ee; --bg:#f7f9fc; --card:#fff;
    /* --blue / --blue-d are the live theme accent — re-set per unit by setTheme() */
    --blue:#2563eb; --blue-d:#1d4ed8; --teal:#0d9488;
    --theme-deep:#0c2a78; --theme-soft:#eef3fb;
    --bronze:#b07a2e; --bronze-bg:#f6ecd9; --silver:#6b7280; --silver-bg:#eef1f4; --gold:#b8860b; --gold-bg:#fbf3d3; --gt:#7c3aed; --gt-bg:#efe8fe;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  h1,h2,h3,h4{margin:0;line-height:1.2}
  a{color:var(--blue)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line)}
  .nav{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px}
  .brand{font-weight:900;font-size:1.25rem;color:var(--ink);display:flex;align-items:center;gap:9px;cursor:pointer}
  .brand .l{width:32px;height:32px;border-radius:9px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:1rem}
  .nav .sp{flex:1}
  .crumb{color:var(--muted);font-weight:700;font-size:.9rem;cursor:pointer}
  .crumb:hover{color:var(--ink)}

  .btn{display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font:inherit;font-weight:800;
    background:var(--blue);color:#fff;padding:11px 18px;border-radius:11px;transition:filter .12s,transform .08s;text-decoration:none}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--blue);box-shadow:inset 0 0 0 2px var(--line)}
  .btn.sm{padding:7px 13px;font-size:.85rem;border-radius:9px}
  .btn.gray{background:#eef1f5;color:var(--ink)}

  section{padding:34px 0}
  .home-hero{position:relative;overflow:hidden;border-radius:24px;margin:24px 0;padding:66px 28px;text-align:center;color:#fff;
    background:radial-gradient(900px 460px at 18% -25%, #2247c0 0%, transparent 60%), radial-gradient(760px 380px at 102% 120%, #0ea5e9 0%, transparent 55%), linear-gradient(160deg,#081640,#0c2a78 58%,#081842);
    box-shadow:0 24px 60px rgba(8,20,60,.4)}
  .home-hero .hero-inner{position:relative;z-index:2}
  .home-hero .eyebrow{color:#9cc2ff}
  .home-hero h1{font-size:clamp(2.2rem,6vw,3.6rem);color:#ffe24d;text-shadow:0 4px 22px rgba(0,0,0,.4)}
  .home-hero p{color:#ffe24d;max-width:640px;margin:16px auto 26px;font-weight:600;font-size:1.12rem}
  .home-hero p b{color:inherit;font-weight:inherit}
  .home-hero .cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .home-hero .cta .btn{background:#38bdf8;color:#062a45;box-shadow:0 5px 0 #0e8ed0}
  .home-hero .cta .btn:hover{filter:brightness(1.05)}
  .home-hero .cta .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #0e8ed0}
  .home-hero .cta .btn.ghost{background:#38bdf8;color:#062a45;box-shadow:0 5px 0 #0e8ed0}
  .home-hero .float{position:absolute;z-index:1;opacity:.4;animation:floaty 7s ease-in-out infinite;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-22px) rotate(4deg)}}
  .unit-slideshow{margin-top:26px;min-height:64px;display:flex;justify-content:center}
  .us-slide{display:flex;flex-direction:column;align-items:center;gap:4px}
  .us-slide.anim{animation:usIn .6s cubic-bezier(.2,.7,.2,1)}
  @keyframes usIn{0%{opacity:0;transform:translateY(14px) scale(.97)}100%{opacity:1;transform:none}}
  .us-badge{font-weight:800;color:#7fb3ff;text-transform:uppercase;letter-spacing:.1em;font-size:.8rem}
  .us-title{font-weight:800;font-size:1.4rem;color:#ffe24d;text-align:center}
  .us-dots{display:flex;gap:6px;justify-content:center;margin-top:12px}
  .us-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}
  .us-dot.on{background:#38bdf8}
  @media(prefers-reduced-motion:reduce){.us-slide.anim{animation:none}}
  @media (prefers-reduced-motion:reduce){.home-hero .float{animation:none}}
  @media (max-width:760px){.home-hero .float{display:none}}

  .eyebrow{color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;font-size:.8rem;margin-bottom:6px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:18px}
  .ucard{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--uc,var(--line));border-radius:var(--radius);padding:18px 20px 20px;display:flex;flex-direction:column;gap:6px}
  .ucard .u-n{color:var(--ucd,var(--muted));font-weight:800;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}
  .ucard h3{font-size:1.15rem}
  .ucard p{color:var(--muted);font-weight:600;margin:2px 0 10px;flex:1;font-size:.95rem}
  .ucard.live{cursor:pointer}
  .ucard.live:hover{border-color:var(--uc,var(--blue));box-shadow:0 8px 20px rgba(15,23,42,.1)}
  .pill{align-self:flex-start;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;padding:4px 10px;border-radius:99px}
  .pill.live{background:var(--ucs,#e7f6ee);color:var(--ucd,#0f7a44)}.pill.soon{background:#f0f2f5;color:var(--silver)}

  /* single-page standard layout (the sketch) */
  .std{display:grid;grid-template-columns:300px 1fr;gap:28px;align-items:start}
  @media(max-width:820px){.std{grid-template-columns:1fr}}
  .std-left{position:sticky;top:74px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  @media(max-width:820px){.std-left{position:static}}
  .std-left h2{font-size:1.15rem;margin-bottom:4px}
  .std-left .topic-sub{color:var(--muted);font-weight:700;font-size:.9rem;margin-bottom:14px}
  .std-left h3{font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:10px 0 8px}
  .std-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .std-list li{font-weight:600;font-size:.92rem;color:var(--ink);padding-left:24px;position:relative}
  .std-list li b{display:inline-grid;place-items:center;position:absolute;left:0;top:1px;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:.7rem}
  .std-list li.dim{color:var(--muted)} .std-list li.dim b{background:var(--silver)}

  .lesson{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px}
  .lesson .lhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .lesson .lhead h3{font-size:1.18rem;flex:1;min-width:200px}
  .lesson .lo{margin:12px 0 6px}
  .lesson .lo b{color:var(--blue-d)}
  .sc{margin:8px 0;border-left:3px solid var(--line);padding-left:14px}
  .sc .band{font-weight:800;color:var(--blue-d);margin-top:10px;margin-bottom:1px}
  .sc .band .d{color:var(--blue)}
  .sc ul{margin:2px 0 0;padding-left:20px;color:var(--muted);font-weight:600;line-height:1.5}
  .sc ul li{margin:2px 0}
  .sc .sc-row{margin:8px 0;color:var(--muted);font-weight:600;line-height:1.5}
  .sc .sc-row .d{color:var(--blue);margin-right:4px}
  .sc .sc-row b{color:var(--blue-d)}
  .tasks{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .tasks .lbl{font-weight:800;color:var(--muted);font-size:.9rem;margin-right:2px}
  .medal{cursor:pointer;border:none;font:inherit;font-weight:800;font-size:.82rem;padding:7px 13px;border-radius:9px}
  .medal.b{background:var(--bronze-bg);color:var(--bronze)} .medal.s{background:var(--silver-bg);color:var(--silver)}
  .medal.g{background:var(--gold-bg);color:var(--gold)} .medal.gt{background:var(--gt-bg);color:var(--gt)}
  .lesson .lfoot{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

  /* lesson detail: slide deck */
  .deck{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .slide{padding:30px;min-height:300px}
  .slide .stag{display:inline-block;background:var(--blue);color:#fff;font-weight:800;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;padding:4px 12px;border-radius:99px;margin-bottom:14px}
  .slide h3{font-size:1.5rem;margin-bottom:12px}
  .slide ul{padding-left:20px;line-height:1.7} .slide li{margin:3px 0}
  .slide .twocol{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:10px}
  @media(max-width:680px){.slide .twocol{grid-template-columns:1fr}}
  .anchor{border:1px solid var(--line);border-radius:10px;padding:12px}
  .anchor h4{color:var(--blue);margin-bottom:6px}
  .deck-bar{display:flex;align-items:center;gap:12px;border-top:1px solid var(--line);padding:12px 18px;background:#fafbfd}
  .deck-bar .dots{flex:1;display:flex;gap:6px;justify-content:center}
  .deck-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .deck-bar .dot.on{background:var(--blue)}
  .detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}

  /* MCQ */
  .quiz .q{margin-bottom:14px}
  .quiz .qt{font-weight:800;margin-bottom:8px}
  .quiz .opt{display:block;width:100%;text-align:left;background:#f4f7fb;border:2px solid transparent;border-radius:10px;padding:10px 13px;margin:6px 0;cursor:pointer;font:inherit;font-weight:600}
  .quiz .opt:hover{background:#eaf0f9}
  .quiz .opt.correct{background:#e7f6ee;border-color:#46b377;color:#0f7a44}
  .quiz .opt.wrong{background:#fdeaea;border-color:#e88;color:#b23}
  .quiz .opt.sel{background:var(--theme-soft);border-color:var(--blue);color:var(--blue-d)}
  .quiz .opt.lock{pointer-events:none}
  .scoreline{font-weight:800;color:var(--muted);margin-top:6px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .panel h3{margin-bottom:10px}
  .vocab{display:flex;flex-wrap:wrap;gap:8px}
  .vocab span{background:var(--theme-soft);color:var(--blue-d);font-weight:700;padding:6px 12px;border-radius:99px;font-size:.9rem}
  .vhead{color:var(--muted);font-weight:700;font-size:.9rem;margin:2px 0 10px}
  .vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .vcard{perspective:900px;height:128px;cursor:pointer}
  .vinner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
  .vcard.flip .vinner{transform:rotateY(180deg)}
  .vface{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;border:1px solid var(--line)}
  .vfront{background:var(--theme-soft)}
  .vfront .ve{font-size:1.9rem;animation:vfloat 4s ease-in-out infinite}
  .vfront .vw{font-weight:800;color:var(--blue-d);margin-top:4px}
  .vfront .vhint{font-size:.68rem;color:var(--muted);margin-top:3px}
  .vback{background:linear-gradient(160deg,var(--blue),var(--theme-deep));color:#fff;transform:rotateY(180deg);font-weight:600;font-size:.86rem;line-height:1.35}
  /* realistic icons */
  .sci-ico{width:38px;height:38px;vertical-align:middle;margin-right:8px;display:inline-block}
  .slide li .sci-ico{width:34px;height:34px}
  .anchor h4 .sci-ico{width:42px;height:42px;margin-right:6px}
  .vfront .sci-ico{width:58px;height:58px;margin:0 0 2px;animation:vfloat 4s ease-in-out infinite}
  .ico-list{list-style:none;padding-left:0}
  .ico-list li{display:flex;align-items:center;gap:2px;margin:10px 0;font-size:1.05rem}
  /* interactive slide widgets */
  .widget{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px}
  .w-title{font-weight:800;color:var(--blue-d);margin-bottom:10px}
  .w-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .w-card{perspective:900px;height:140px;cursor:pointer}
  .w-card .vinner{height:100%}
  .w-card.flip .vinner{transform:rotateY(180deg)}
  .w-card .vfront,.w-card .vback{flex-direction:column;padding:12px}
  .w-card .vfront{background:var(--theme-soft)}
  .w-card .wl{font-weight:800;color:var(--blue-d);margin-top:4px}
  .obs{width:100%;border-collapse:collapse}
  .obs th,.obs td{border:1px solid var(--line);padding:8px;text-align:center;font-weight:700}
  .obs th{background:#f4f7fb;font-size:.85rem}
  .obs td.lab{text-align:left} .obs td.lab .sci-ico{width:26px;height:26px;margin-right:4px}
  .obs .cell{cursor:pointer;font-size:1.2rem;display:inline-block;min-width:44px;user-select:none}
  .obs .cell.ans{outline:2px solid #46b377;border-radius:6px;color:#0f7a44}
  .w-bins{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:10px}
  .w-bin{border:2px dashed var(--line);border-radius:10px;padding:8px;text-align:center;cursor:pointer;font-weight:800}
  .w-bin .drop{min-height:38px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center}
  .w-bin .drop .sci-ico{width:26px;height:26px;margin:0}
  .w-bin.pop{border-color:#46b377;background:#eef9f1}.w-bin.shake{animation:wshake .4s}
  @keyframes wshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .w-tray{display:flex;flex-wrap:wrap;gap:8px}
  .w-chip{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 11px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:2px}
  .w-chip .sci-ico{width:24px;height:24px;margin:0}
  .w-chip.sel{outline:3px solid var(--blue)} .w-chip.done{opacity:.35;cursor:default}
  .w-fb{font-weight:800;margin-top:8px;min-height:22px}
  .w-cls{text-align:center}
  .w-cls .item{font-size:1.15rem;font-weight:800;margin:10px 0;display:flex;flex-direction:column;align-items:center;gap:4px}
  .w-cls .item .sci-ico{width:54px;height:54px;margin:0}
  .w-cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  @keyframes vfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @media (prefers-reduced-motion:reduce){.vfront .ve{animation:none}.vinner{transition:none}}

  /* clickable standards (sketch: tap a standard → see its lessons) */
  .std-list li.click{cursor:pointer;padding-top:6px;padding-bottom:6px;border-radius:9px;transition:background .12s}
  .std-list li.click b{top:7px}
  .std-list li.click:hover{background:var(--theme-soft)}
  .std-list li.sel{background:var(--theme-soft);color:var(--blue-d);font-weight:800}
  .std-list li.sel b{background:var(--blue-d)}
  .std-head{font-weight:800;color:var(--blue-d);font-size:1.05rem;margin:0 0 14px;line-height:1.4}
  .std-head .sn{display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:2px 11px;margin-right:9px;font-size:.85rem;vertical-align:2px}

  /* expand slide to full screen */
  .deck{position:relative}
  .expandbtn{position:absolute;top:9px;right:9px;z-index:6;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:9px;cursor:pointer;font:inherit;font-weight:800;font-size:.78rem;padding:6px 11px;color:var(--blue-d)}
  .expandbtn:hover{background:#fff}
  body.deck-fs{overflow:hidden}
  .deck.fs{position:fixed;inset:14px;z-index:80;display:flex;flex-direction:column;box-shadow:0 0 0 9999px rgba(8,16,40,.62);overflow:auto;margin:0}
  .deck.fs .slide{flex:1;min-height:auto;padding:34px clamp(26px,6vw,88px);font-size:1.12rem}
  .deck.fs .slide h3{font-size:clamp(1.6rem,3.2vw,2.2rem)}
  .deck.fs .deck-bar{position:sticky;bottom:0}

  /* AFL — assessment-for-learning check (interactive) */
  .afl{margin-top:4px}
  .afl-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--theme-soft);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:9px 0}
  .afl-row .at{flex:1;min-width:170px;font-weight:700}
  .afl-btns{display:flex;gap:6px}
  .afl-b{cursor:pointer;border:2px solid var(--line);background:#fff;border-radius:10px;font:inherit;font-weight:800;font-size:.82rem;padding:7px 11px;display:inline-flex;align-items:center;gap:5px;transition:transform .08s,background .12s}
  .afl-b:hover{transform:translateY(-1px)}
  .afl-b.sel{color:#fff}
  .afl-b.g.sel,.afl-b.ok.sel{background:#2aa45a;border-color:#2aa45a}
  .afl-b.y.sel{background:#e0a32e;border-color:#e0a32e}
  .afl-b.r.sel,.afl-b.no.sel{background:#d8503e;border-color:#d8503e}
  .afl-fb{font-weight:800;min-width:80px}

  /* printable sheet */
  .ws{background:#fff;color:#111;padding:6px 4px}
  .ws h1{font-size:1.5rem;margin-bottom:2px}.ws h2{font-size:1.15rem;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px}
  .ws .meta{font-weight:700;color:#444;margin-bottom:8px}
  .ws ol,.ws ul{line-height:2}
  .ws .lines{border-bottom:1px solid #bbb;height:26px;margin:6px 0}
  .cut-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:10px 0}
  .cut-card{border:2px dashed #888;border-radius:10px;padding:12px 8px;text-align:center;background:#fff;break-inside:avoid}
  .cut-card .sci-ico{width:56px;height:56px;margin:0}
  .cut-card .cl{font-weight:800;margin-top:6px;color:#111}
  .sort-board{display:grid;grid-template-columns:repeat(var(--cols,3),1fr);gap:12px;margin-top:10px}
  .sort-col{border:1.5px solid #888;border-radius:8px;min-height:170px}
  .sort-col h3{background:#eee;margin:0;padding:7px;text-align:center;font-size:1rem;border-bottom:1.5px solid #888}
  .ws-table{width:100%;border-collapse:collapse;margin:10px 0}
  .ws-table th,.ws-table td{border:1px solid #888;padding:10px;text-align:center;font-size:1rem}
  .ws-table th{background:#eef3fb;color:#1d4ed8}
  .ws-table td.lab{font-weight:800} .ws-table td.lab .sci-ico{width:40px;height:40px;margin:0 6px 0 0}
  .ws-in{width:88%;border:none;border-bottom:1.5px solid #888;font:inherit;font-size:1rem;text-align:center;padding:4px;background:transparent}
  .ws-in:focus{outline:none;border-bottom-color:#2563eb}
  .ws-area{width:100%;min-height:70px;border:1.5px solid #888;border-radius:8px;font:inherit;font-size:1rem;padding:8px;margin-top:6px}
  .assess-q li{margin-bottom:14px;font-size:1.05rem}
  .assess-q .ws-area{min-height:46px}
  .checklist{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .chk{display:flex;align-items:center;gap:10px;background:#f4f7fb;border:1px solid var(--line);border-radius:10px;padding:11px 14px;cursor:pointer;font:inherit;font-weight:700;text-align:left;color:#111}
  .chk .box{width:22px;height:22px;border:2px solid #888;border-radius:6px;flex:0 0 auto;position:relative}
  .chk.on{background:#e7f6ee;border-color:#46b377}
  .chk.on .box{background:#46b377;border-color:#46b377}
  .chk.on .box::after{content:'✓';color:#fff;position:absolute;inset:0;display:grid;place-items:center;font-size:.85rem;font-weight:800}
  .no-print{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .pic-bank{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0}
  .pic{border:1px solid #ccc;border-radius:10px;padding:8px;background:#fff}
  .pic .sci-ico{width:46px;height:46px;margin:0}
  .sheet-page{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;color:#111}

function openCheck(){

    const n=L.mcqs.length;
    area.innerHTML=`<div class="panel quiz" id="qz"><div class="no-print"><h3>📝 Quick Check</h3><button class="btn gray sm" onclick="window.print()">🖨️ Print questions</button></div>
      ${L.mcqs.map((q,qi)=>`<div class="q" data-q="${qi}"><div class="qt">${qi+1}. ${q.q}</div>${q.options.map((o,oi)=>{let c='opt';if(checked){c+=' lock';if(oi===q.answer)c+=' correct';else if(oi===sel[qi])c+=' wrong';}else if(sel[qi]===oi)c+=' sel';return `<button class="${c}" onclick="window.__pick(${qi},${oi})">${String.fromCharCode(65+oi)}. ${o}</button>`;}).join('')}</div>`).join('')}

  }
  window.__pick=(qi,oi)=>{sel[qi]=oi;const block=document.querySelector('#qz .q[data-q="'+qi+'"]');if(block)block.querySelectorAll('.opt').forEach((o,k)=>o.classList.toggle('sel',k===oi));};

function wAFL(host,w){

      <div class="afl-btns">${opts.map(o=>`<button class="afl-b ${o.k}" data-k="${o.k}">${o.t}</button>`).join('')}</div>
      <span class="afl-fb"></span></div>`).join('')}</div>`;
  host.querySelectorAll('.afl-row').forEach((row,si)=>{
    const st=w.statements[si], fb=row.querySelector('.afl-fb');
    row.querySelectorAll('.afl-b').forEach(b=>b.onclick=()=>{
      row.querySelectorAll('.afl-b').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      if(mode==='judge'){
        const ok=(b.dataset.k==='ok')===!!st.correct;
        fb.style.color=ok?'#2aa45a':'#d8503e';
        fb.textContent=ok?'✓ Correct!':(st.correct?'It is True':'It is False');
      }else{

function wParticles(host,w){
  host.innerHTML=`<div class="w-title">👆 Click a state and watch how the particles move.</div>
