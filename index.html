<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Science Explorers</title>
<!-- Comic Sans MS (local) with self-hosted Comic Neue fallback (works offline) -->
<style>
  @font-face{font-family:'Comic Neue';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/ComicNeue-400.woff2') format('woff2');}
  @font-face{font-family:'Comic Neue';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/ComicNeue-700.woff2') format('woff2');}
  :root{
    --ink:#1f2a37; --muted:#5b6877; --line:#e4e8ee; --bg:#f7f9fc; --card:#fff;
    /* --blue / --blue-d are the live theme accent — re-set per unit by setTheme() */
    --blue:#2563eb; --blue-d:#1d4ed8; --teal:#0d9488;
    --theme-deep:#0c2a78; --theme-soft:#eef3fb;
    --bronze:#b07a2e; --bronze-bg:#f6ecd9; --silver:#6b7280; --silver-bg:#eef1f4; --gold:#b8860b; --gold-bg:#fbf3d3; --gt:#7c3aed; --gt-bg:#efe8fe;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:'Comic Sans MS','Comic Neue',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  h1,h2,h3,h4{margin:0;line-height:1.2}
  a{color:var(--blue)}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line)}
  .nav{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px}
  .brand{font-weight:900;font-size:1.25rem;color:var(--ink);display:flex;align-items:center;gap:9px;cursor:pointer}
  .brand .l{width:32px;height:32px;border-radius:9px;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:1rem}
  .nav .sp{flex:1}
  .crumb{color:var(--muted);font-weight:700;font-size:.9rem;cursor:pointer}
  .crumb:hover{color:var(--ink)}

  .btn{display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font:inherit;font-weight:800;
    background:var(--blue);color:#fff;padding:11px 18px;border-radius:11px;transition:filter .12s,transform .08s;text-decoration:none}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:var(--blue);box-shadow:inset 0 0 0 2px var(--line)}
  .btn.sm{padding:7px 13px;font-size:.85rem;border-radius:9px}
  .btn.gray{background:#eef1f5;color:var(--ink)}

  section{padding:34px 0}
  .home-hero{position:relative;overflow:hidden;border-radius:24px;margin:24px 0;padding:66px 28px;text-align:center;color:#fff;
    background:radial-gradient(900px 460px at 18% -25%, #2247c0 0%, transparent 60%), radial-gradient(760px 380px at 102% 120%, #0ea5e9 0%, transparent 55%), linear-gradient(160deg,#081640,#0c2a78 58%,#081842);
    box-shadow:0 24px 60px rgba(8,20,60,.4)}
  .home-hero .hero-inner{position:relative;z-index:2}
  .home-hero .eyebrow{color:#9cc2ff}
  .home-hero h1{font-size:clamp(2.2rem,6vw,3.6rem);color:#ffe24d;text-shadow:0 4px 22px rgba(0,0,0,.4)}
  .home-hero p{color:#ffe24d;max-width:640px;margin:16px auto 26px;font-weight:600;font-size:1.12rem}
  .home-hero p b{color:inherit;font-weight:inherit}
  .home-hero .cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .home-hero .cta .btn{background:#38bdf8;color:#062a45;box-shadow:0 5px 0 #0e8ed0}
  .home-hero .cta .btn:hover{filter:brightness(1.05)}
  .home-hero .cta .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #0e8ed0}
  .home-hero .cta .btn.ghost{background:#38bdf8;color:#062a45;box-shadow:0 5px 0 #0e8ed0}
  .home-hero .float{position:absolute;z-index:1;opacity:.4;animation:floaty 7s ease-in-out infinite;filter:drop-shadow(0 4px 10px rgba(0,0,0,.35))}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-22px) rotate(4deg)}}
  .unit-slideshow{margin-top:26px;min-height:64px;display:flex;justify-content:center}
  .us-slide{display:flex;flex-direction:column;align-items:center;gap:4px}
  .us-slide.anim{animation:usIn .6s cubic-bezier(.2,.7,.2,1)}
  @keyframes usIn{0%{opacity:0;transform:translateY(14px) scale(.97)}100%{opacity:1;transform:none}}
  .us-badge{font-weight:800;color:#7fb3ff;text-transform:uppercase;letter-spacing:.1em;font-size:.8rem}
  .us-title{font-weight:800;font-size:1.4rem;color:#ffe24d;text-align:center}
  .us-dots{display:flex;gap:6px;justify-content:center;margin-top:12px}
  .us-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}
  .us-dot.on{background:#38bdf8}
  @media(prefers-reduced-motion:reduce){.us-slide.anim{animation:none}}
  @media (prefers-reduced-motion:reduce){.home-hero .float{animation:none}}
  @media (max-width:760px){.home-hero .float{display:none}}

  .eyebrow{color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em;font-size:.8rem;margin-bottom:6px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:18px}
  .ucard{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--uc,var(--line));border-radius:var(--radius);padding:18px 20px 20px;display:flex;flex-direction:column;gap:6px}
  .ucard .u-n{color:var(--ucd,var(--muted));font-weight:800;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em}
  .ucard h3{font-size:1.15rem}
  .ucard p{color:var(--muted);font-weight:600;margin:2px 0 10px;flex:1;font-size:.95rem}
  .ucard.live{cursor:pointer}
  .ucard.live:hover{border-color:var(--uc,var(--blue));box-shadow:0 8px 20px rgba(15,23,42,.1)}
  .pill{align-self:flex-start;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;padding:4px 10px;border-radius:99px}
  .pill.live{background:var(--ucs,#e7f6ee);color:var(--ucd,#0f7a44)}.pill.soon{background:#f0f2f5;color:var(--silver)}
  /* grade picker on the home page */
  .grade-cards{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:18px auto 8px;max-width:760px}
  .grade-card{cursor:pointer;font:inherit;background:var(--card);border:1px solid var(--line);border-top:5px solid #2563eb;border-radius:16px;padding:16px 20px;min-width:118px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:transform .1s,box-shadow .12s}
  .grade-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(15,23,42,.1)}
  .grade-card .gc-lbl{font-weight:900;font-size:.82rem;text-transform:uppercase;letter-spacing:.1em;color:#475569}
  .grade-card .gc-num{font-weight:900;font-size:2.8rem;line-height:1.05;color:#1d4ed8;-webkit-text-stroke:.6px currentColor}
  .grade-card .gc-st{font-weight:900;font-size:.84rem;color:#0f7a44}
  .grade-card.soon{opacity:.62}.grade-card.soon .gc-st{color:var(--silver)}
  .grade-cards .grade-card:nth-child(1){border-top-color:#ea580c}.grade-cards .grade-card:nth-child(1) .gc-num{color:#c2410c}
  .grade-cards .grade-card:nth-child(2){border-top-color:#16a34a}.grade-cards .grade-card:nth-child(2) .gc-num{color:#15803d}
  .grade-cards .grade-card:nth-child(3){border-top-color:#db2777}.grade-cards .grade-card:nth-child(3) .gc-num{color:#be185d}
  .grade-cards .grade-card:nth-child(4){border-top-color:#0d9488}.grade-cards .grade-card:nth-child(4) .gc-num{color:#0b7a70}
  .grade-cards .grade-card:nth-child(5){border-top-color:#2563eb}.grade-cards .grade-card:nth-child(5) .gc-num{color:#1d4ed8}

  /* single-page standard layout (the sketch) */
  .std{display:grid;grid-template-columns:300px 1fr;gap:28px;align-items:start}
  @media(max-width:820px){.std{grid-template-columns:1fr}}
  .std-left{position:sticky;top:74px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  @media(max-width:820px){.std-left{position:static}}
  .std-left h2{font-size:1.15rem;margin-bottom:4px}
  .std-left .topic-sub{color:var(--muted);font-weight:700;font-size:.9rem;margin-bottom:14px}
  .std-left h3{font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:10px 0 8px}
  .std-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .std-list li{font-weight:600;font-size:.92rem;color:var(--ink);padding-left:24px;position:relative}
  .std-list li b{display:inline-grid;place-items:center;position:absolute;left:0;top:1px;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:.7rem}
  .std-list li.dim{color:var(--muted)} .std-list li.dim b{background:var(--silver)}

  .lesson{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px}
  .lesson .lhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .lesson .lhead h3{font-size:1.18rem;flex:1;min-width:200px}
  .lesson .lo{margin:12px 0 6px}
  .lesson .lo b{color:var(--blue-d)}
  .sc{margin:8px 0;border-left:3px solid var(--line);padding-left:14px}
  .sc .band{font-weight:800;color:var(--blue-d);margin-top:10px;margin-bottom:1px}
  .sc .band .d{color:var(--blue)}
  .sc ul{margin:2px 0 0;padding-left:20px;color:var(--muted);font-weight:600;line-height:1.5}
  .sc ul li{margin:2px 0}
  .sc .sc-row{margin:8px 0;color:var(--muted);font-weight:600;line-height:1.5}
  .sc .sc-row .d{color:var(--blue);margin-right:4px}
  .sc .sc-row b{color:var(--blue-d)}
  .tasks{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .tasks .lbl{font-weight:800;color:var(--muted);font-size:.9rem;margin-right:2px}
  .medal{cursor:pointer;border:none;font:inherit;font-weight:800;font-size:.82rem;padding:7px 13px;border-radius:9px}
  .medal.b{background:var(--bronze-bg);color:var(--bronze)} .medal.s{background:var(--silver-bg);color:var(--silver)}
  .medal.g{background:var(--gold-bg);color:var(--gold)} .medal.gt{background:var(--gt-bg);color:var(--gt)}
  .lesson .lfoot{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

  /* lesson detail: slide deck */
  .deck{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .slide{padding:30px;min-height:300px}
  .slide .stag{display:inline-block;background:var(--blue);color:#fff;font-weight:800;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;padding:4px 12px;border-radius:99px;margin-bottom:14px}
  .slide h3{font-size:1.5rem;margin-bottom:12px}
  .slide ul{padding-left:20px;line-height:1.7} .slide li{margin:3px 0}
  .slide .twocol{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:10px}
  @media(max-width:680px){.slide .twocol{grid-template-columns:1fr}}
  .anchor{border:1px solid var(--line);border-radius:10px;padding:12px}
  .anchor h4{color:var(--blue);margin-bottom:6px}
  .deck-bar{display:flex;align-items:center;gap:12px;border-top:1px solid var(--line);padding:12px 18px;background:#fafbfd}
  .deck-bar .dots{flex:1;display:flex;gap:6px;justify-content:center}
  .deck-bar .dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .deck-bar .dot.on{background:var(--blue)}
  .detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}

  /* MCQ */
  .quiz .q{margin-bottom:14px}
  .quiz .qt{font-weight:800;margin-bottom:8px}
  .quiz .opt{display:block;width:100%;text-align:left;background:#f4f7fb;border:2px solid transparent;border-radius:10px;padding:10px 13px;margin:6px 0;cursor:pointer;font:inherit;font-weight:600}
  .quiz .opt:hover{background:#eaf0f9}
  .quiz .opt.correct{background:#e7f6ee;border-color:#46b377;color:#0f7a44}
  .quiz .opt.wrong{background:#fdeaea;border-color:#e88;color:#b23}
  .quiz .opt.sel{background:var(--theme-soft);border-color:var(--blue);color:var(--blue-d)}
  .quiz .opt.lock{pointer-events:none}
  .scoreline{font-weight:800;color:var(--muted);margin-top:6px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:16px}
  .panel h3{margin-bottom:10px}
  .vocab{display:flex;flex-wrap:wrap;gap:8px}
  .vocab span{background:var(--theme-soft);color:var(--blue-d);font-weight:700;padding:6px 12px;border-radius:99px;font-size:.9rem}
  .vhead{color:var(--muted);font-weight:700;font-size:.9rem;margin:2px 0 10px}
  .vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .vcard{perspective:900px;height:128px;cursor:pointer}
  .vinner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
  .vcard.flip .vinner{transform:rotateY(180deg)}
  .vface{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;border:1px solid var(--line)}
  .vfront{background:var(--theme-soft)}
  .vfront .ve{font-size:1.9rem;animation:vfloat 4s ease-in-out infinite}
  .vfront .vw{font-weight:800;color:var(--blue-d);margin-top:4px}
  .vfront .vhint{font-size:.68rem;color:var(--muted);margin-top:3px}
  .vback{background:linear-gradient(160deg,var(--blue),var(--theme-deep));color:#fff;transform:rotateY(180deg);font-weight:600;font-size:.86rem;line-height:1.35}
  /* realistic icons */
  .sci-ico{width:38px;height:38px;vertical-align:middle;margin-right:8px;display:inline-block}
  .slide li .sci-ico{width:34px;height:34px}
  .anchor h4 .sci-ico{width:42px;height:42px;margin-right:6px}
  .vfront .sci-ico{width:58px;height:58px;margin:0 0 2px;animation:vfloat 4s ease-in-out infinite}
  .ico-list{list-style:none;padding-left:0}
  .ico-list li{display:flex;align-items:center;gap:2px;margin:10px 0;font-size:1.05rem}
  /* interactive slide widgets */
  .widget{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px}
  .w-title{font-weight:800;color:var(--blue-d);margin-bottom:10px}
  .w-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .w-card{perspective:900px;height:140px;cursor:pointer}
  .w-card .vinner{height:100%}
  .w-card.flip .vinner{transform:rotateY(180deg)}
  .w-card .vfront,.w-card .vback{flex-direction:column;padding:12px}
  .w-card .vfront{background:var(--theme-soft)}
  .w-card .wl{font-weight:800;color:var(--blue-d);margin-top:4px}
  .obs{width:100%;border-collapse:collapse}
  .obs th,.obs td{border:1px solid var(--line);padding:8px;text-align:center;font-weight:700}
  .obs th{background:#f4f7fb;font-size:.85rem}
  .obs td.lab{text-align:left} .obs td.lab .sci-ico{width:26px;height:26px;margin-right:4px}
  .obs .cell{cursor:pointer;font-size:1.2rem;display:inline-block;min-width:44px;user-select:none}
  .obs .cell.ans{outline:2px solid #46b377;border-radius:6px;color:#0f7a44}
  .w-bins{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:10px}
  .w-bin{border:2px dashed var(--line);border-radius:10px;padding:8px;text-align:center;cursor:pointer;font-weight:800}
  .w-bin .drop{min-height:38px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;align-items:center}
  .w-bin .drop .sci-ico{width:26px;height:26px;margin:0}
  .w-bin.pop{border-color:#46b377;background:#eef9f1}.w-bin.shake{animation:wshake .4s}
  @keyframes wshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .w-tray{display:flex;flex-wrap:wrap;gap:8px}
  .w-chip{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 11px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:2px}
  .w-chip .sci-ico{width:24px;height:24px;margin:0}
  .w-chip.sel{outline:3px solid var(--blue)} .w-chip.done{opacity:.35;cursor:default}
  .w-fb{font-weight:800;margin-top:8px;min-height:22px}
  .w-cls{text-align:center}
  .w-cls .item{font-size:1.15rem;font-weight:800;margin:10px 0;display:flex;flex-direction:column;align-items:center;gap:4px}
  .w-cls .item .sci-ico{width:54px;height:54px;margin:0}
  .w-cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  @keyframes vfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @media (prefers-reduced-motion:reduce){.vfront .ve{animation:none}.vinner{transition:none}}

  /* clickable standards (sketch: tap a standard → see its lessons) */
  .std-list li.click{cursor:pointer;padding-top:6px;padding-bottom:6px;border-radius:9px;transition:background .12s}
  .std-list li.click b{top:7px}
  .std-list li.click:hover{background:var(--theme-soft)}
  .std-list li.sel{background:var(--theme-soft);color:var(--blue-d);font-weight:800}
  .std-list li.sel b{background:var(--blue-d)}
  .std-head{font-weight:800;color:var(--blue-d);font-size:1.05rem;margin:0 0 14px;line-height:1.4}
  .std-head .sn{display:inline-block;background:var(--blue);color:#fff;border-radius:8px;padding:2px 11px;margin-right:9px;font-size:.85rem;vertical-align:2px}

  /* expand slide to full screen */
  .deck{position:relative}
  .expandbtn{position:absolute;top:9px;right:9px;z-index:6;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:9px;cursor:pointer;font:inherit;font-weight:800;font-size:.78rem;padding:6px 11px;color:var(--blue-d)}
  .expandbtn:hover{background:#fff}
  body.deck-fs{overflow:hidden}
  .deck.fs{position:fixed;inset:14px;z-index:80;display:flex;flex-direction:column;box-shadow:0 0 0 9999px rgba(8,16,40,.62);overflow:auto;margin:0}
  .deck.fs .slide{flex:1;min-height:auto;padding:34px clamp(26px,6vw,88px);font-size:1.12rem}
  .deck.fs .slide h3{font-size:clamp(1.6rem,3.2vw,2.2rem)}
  .deck.fs .deck-bar{position:sticky;bottom:0}

  /* AFL — assessment-for-learning check (interactive) */
  .afl{margin-top:4px}
  .afl-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--theme-soft);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:9px 0}
  .afl-row .at{flex:1;min-width:170px;font-weight:700}
  .afl-btns{display:flex;gap:6px}
  .afl-b{cursor:pointer;border:2px solid var(--line);background:#fff;border-radius:10px;font:inherit;font-weight:800;font-size:.82rem;padding:7px 11px;display:inline-flex;align-items:center;gap:5px;transition:transform .08s,background .12s}
  .afl-b:hover{transform:translateY(-1px)}
  .afl-b.sel{color:#fff}
  .afl-b.g.sel,.afl-b.ok.sel{background:#2aa45a;border-color:#2aa45a}
  .afl-b.y.sel{background:#e0a32e;border-color:#e0a32e}
  .afl-b.r.sel,.afl-b.no.sel{background:#d8503e;border-color:#d8503e}
  .afl-fb{font-weight:800;min-width:80px}

  /* printable sheet */
  .ws{background:#fff;color:#111;padding:6px 4px}
  .ws h1{font-size:1.5rem;margin-bottom:2px}.ws h2{font-size:1.15rem;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px}
  .ws .meta{font-weight:700;color:#444;margin-bottom:8px}
  .ws ol,.ws ul{line-height:2}
  .ws .lines{border-bottom:1px solid #bbb;height:26px;margin:6px 0}
  .cut-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:10px 0}
  .cut-card{border:2px dashed #888;border-radius:10px;padding:12px 8px;text-align:center;background:#fff;break-inside:avoid}
  .cut-card .sci-ico{width:56px;height:56px;margin:0}
  .cut-card .cl{font-weight:800;margin-top:6px;color:#111}
  .sort-board{display:grid;grid-template-columns:repeat(var(--cols,3),1fr);gap:12px;margin-top:10px}
  .sort-col{border:1.5px solid #888;border-radius:8px;min-height:170px}
  .sort-col h3{background:#eee;margin:0;padding:7px;text-align:center;font-size:1rem;border-bottom:1.5px solid #888}
  .ws-table{width:100%;border-collapse:collapse;margin:10px 0}
  .ws-table th,.ws-table td{border:1px solid #888;padding:10px;text-align:center;font-size:1rem}
  .ws-table th{background:#eef3fb;color:#1d4ed8}

const GRADE4=[
  {n:1,id:'g4en',title:'Energy',live:true,standards:[{n:1,text:'Use evidence to construct an explanation of the relationship between the speed of an object and the energy of that object, and observe that energy can be transferred from place to place and is available from natural sources. (4-PS3, 4-ESS3)',lessons:[{id:'g4ea',title:'Lesson 1: Energy of Motion',grade:'Grade 4 · 50 min · 5E',lo:'We are learning to explain that moving objects have energy and that faster or heavier objects have more energy.',sc:[{band:'Remembering',items:['I can name what energy of motion is.']},{band:'Understanding',items:['I can explain how the speed and mass of an object affect its energy.']},{band:'Applying',items:['I can predict what happens to energy in a collision.']}],vocab:['Energy','Motion','Speed','Collision'],slides:[{tag:'Engage · 10 min',h:'What makes things move?',body:'<p>Look at these moving objects:</p><ul class="ico-list"><li>[[ball]] a rolling ball · [[bike]] a bike going downhill · [[football]] a kicked football · [[person]] a running person</li></ul><p><b>Ask:</b> What do all these have in common? What gives them the ability to move and knock things over?</p>'},{tag:'Explore · 15 min',h:'Faster or heavier?',body:'<p>Roll a heavy ball and a light ball at the same speed. Which one knocks over more blocks?</p><p>Now roll the same ball slowly, then fast. Which roll knocks over more blocks?</p><p><b>Record:</b> What do your results tell you about the energy of moving objects?</p>'},{tag:'Explain · 10 min',h:'Energy of Motion',body:'<p><b>Energy</b> is the ability to make things happen or move. A moving object has <b>motion</b> energy — the energy of movement.</p><p>The <b>speed</b> of an object matters: a faster ball has more energy than a slower one. Mass matters too — a heavier ball moving at the same speed has more energy than a lighter one.</p><p>When a moving object hits another, a <b>collision</b> happens — energy transfers from one object to the other. A bowling ball hits the pins and knocks them over!</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Judge each statement below — is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Show What You Know',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort objects into more energy or less energy.</li><li>🥈 <b>Silver</b> — Choose two moving objects and explain which has more energy and why.</li><li>🥇 <b>Gold</b> — Complete the energy table comparing speed, mass and energy level.</li><li>⭐ <b>G&T</b> — Plan a fair test to find out whether speed or mass has a bigger effect on energy.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>What is motion energy?</li><li>Which has more energy — a fast heavy ball or a slow light ball? Give two reasons.</li></ol>'}],tasks:{bronze:{title:'Bronze — More or Less Energy?',items:['Look at each moving object.','Sort them into MORE energy or LESS energy.'],cards:[{i:'bike',l:'Fast bike going downhill'},{i:'kite',l:'Kite drifting gently'},{i:'ball',l:'Heavy ball rolling fast'},{i:'block',l:'Block sitting still'},{i:'cart',l:'Loaded cart rolling'},{i:'football',l:'Kicked football'}],columns:['More energy','Less energy']},silver:{title:'Silver — Compare Two Objects',items:['Choose two moving objects from the pictures.','Write which has more energy and explain why.'],bank:['ball','bike','football','cart','person','kite'],question:'My two objects and which has more energy and why:'},gold:{title:'Gold — Energy Comparison Table',items:['Fill in the table for each object.','Use low, medium or high for energy level.'],table:{cols:['Object','Fast or slow?','Heavy or light?','Energy level'],rows:[{icon:'ball',label:'Rolling ball'},{icon:'bike',label:'Bike going downhill'},{icon:'football',label:'Kicked football'},{icon:'cart',label:'Loaded cart'}]}},gt:{title:'G&T Challenge — Plan a Fair Test',items:['You want to find out whether speed or mass has a bigger effect on energy.','Plan a fair test: what will you change? What will you keep the same? How will you measure the result?'],question:'My fair test plan:'}},assessment:{title:'Lesson 1 — Assessment',pics:['ball','bike','football'],items:['1. What is motion energy?','2. A fast ball and a slow ball have the same mass. Which has more energy? Explain why.','3. What happens to energy when a rolling ball hits a set of pins?'],check:['I can name what energy of motion is.','I can explain how the speed and mass of an object affect its energy.','I can predict what happens to energy in a collision.']}},{id:'g4eb',title:'Lesson 2: Energy Transfer and Sources',grade:'Grade 4 · 50 min · 5E',lo:'We are learning to explain that energy can be transferred from place to place and that we get energy from natural sources.',sc:[{band:'Remembering',items:['I can name three natural sources of energy.']},{band:'Understanding',items:['I can explain how energy transfers from one place to another.']},{band:'Applying',items:['I can match a natural energy source to what it powers.']}],vocab:['Transfer','Electricity','Fuel','Source'],slides:[{tag:'Engage · 10 min',h:'Where does energy come from?',body:'<p>Look at these energy sources and devices:</p><ul class="ico-list"><li>[[sun]] the sun · [[wind]] the wind · [[river]] flowing water · [[battery]] a battery · [[bulb]] a light bulb</li></ul><p><b>Ask:</b> Where does the energy in your home come from? How does it get from there to here?</p>'},{tag:'Explore · 15 min',h:'Trace the energy path',body:'<p>Think about a battery connected to a bulb with wires. What carries the energy from the battery to the bulb?</p><p>Now think about a wind turbine — the wind spins the blades and the turbine makes electricity. Where does the energy start? Where does it end up?</p><p><b>Discuss:</b> Can you trace the path of energy from the sun all the way to a light in your home?</p>'},{tag:'Explain · 10 min',h:'Energy Transfer and Sources',body:'<p>Energy can <b>transfer</b> — move from one place or object to another. It can travel by collisions, by sound, by heat, by light, or as <b>electricity</b> flowing through wires to power lights and machines.</p><p><b>Fuel</b> — such as wood, oil or gas — is burned to release stored energy. Power stations burn fuel or use natural sources to make electricity.</p><p>We get energy from natural <b>sources</b>: the sun (solar panels), wind (turbines), and moving water (hydro dams). These are renewable — they will not run out.</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Judge each statement below — is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Energy Explorer',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort energy sources into natural or stored.</li><li>🥈 <b>Silver</b> — Pick one energy source and describe how energy transfers from it to something useful.</li><li>🥇 <b>Gold</b> — Complete the energy sources table showing how each source works and one example.</li><li>⭐ <b>G&T</b> — Design a mini renewable power station and explain the full energy transfer chain from source to home.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name three natural sources of energy.</li><li>How does electricity transfer energy from a power station to your home?</li></ol>'}],tasks:{bronze:{title:'Bronze — Natural or Stored?',items:['Look at each energy source.','Sort them into natural source or stored energy.'],cards:[{i:'sun',l:'The sun'},{i:'wind',l:'Wind'},{i:'river',l:'Flowing river'},{i:'wave',l:'Ocean wave'},{i:'battery',l:'Battery'},{i:'fuel',l:'Fuel'}],columns:['Natural source','Stored energy']},silver:{title:'Silver — Trace the Energy',items:['Choose one energy source.','Describe the path energy takes from the source to something useful.'],bank:['sun','battery','turbine','bulb','flashlight'],question:'My energy source and how the energy transfers to something useful:'},gold:{title:'Gold — Energy Sources Table',items:['Complete the table for each natural energy source.','Write how it works and give one real-world example.'],table:{cols:['Energy source','How it gives us energy','One example'],rows:[{icon:'sun',label:'The sun'},{icon:'wind',label:'Wind'},{icon:'river',label:'Moving water'},{icon:'fuel',label:'Fuel'}]}},gt:{title:'G&T Challenge — Design a Power Station',items:['Choose a natural energy source for your mini power station.','Draw and label the design.','Explain the full energy transfer chain from your source to a home.'],question:'My power station design and energy transfer chain:'}},assessment:{title:'Lesson 2 — Assessment',pics:['sun','turbine','battery'],items:['1. Name three natural sources of energy.','2. What does energy transfer mean?','3. How does a wind turbine transfer energy to a home?'],check:['I can name three natural sources of energy.','I can explain how energy transfers from one place to another.','I can match a natural energy source to what it powers.']}}]}]},
  {n:2,id:'g4wv',title:'Waves and Information',live:true,standards:[{n:1,text:'Develop a model of waves to describe patterns in terms of amplitude and wavelength and that waves can cause objects to move, and that objects can be seen when light reflects off them; generate and compare solutions that use patterns to transfer information. (4-PS4)',lessons:[{id:'g4wa',title:'Lesson 1: Waves Carry Energy',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that waves have amplitude and wavelength and carry energy from place to place.',sc:[{band:'Remembering',items:['I can name the parts of a wave including amplitude and wavelength.']},{band:'Understanding',items:['I can explain how the amplitude of a wave relates to the amount of energy it carries.']},{band:'Applying',items:['I can compare two waves and describe which carries more energy and why.']}],vocab:['Wave','Amplitude','Wavelength','Energy'],slides:[{tag:'Engage · 10 min',h:'What is a Wave?',body:'<p>Look at these examples:</p><ul class="ico-list"><li>[[wave]] a wave at sea · [[ocean]] the open ocean · [[speaker]] a speaker making sound · [[drum]] a drum being struck</li></ul><p><b>Ask:</b> What do all of these have in common? Have you ever felt a wave push you in the water? What did it feel like?</p>'},{tag:'Explore · 15 min',h:'Watching Waves',body:'<p>Observe a video of water waves and answer these questions:</p><ul><li>What part of the wave goes <b>up</b> and what goes <b>down</b>?</li><li>Does the water travel across the ocean, or does the <b>energy</b> travel?</li><li>Watch a floating [[kite]] or rubber duck — it bobs up and down but does not travel with the wave.</li></ul><p>Compare a tiny [[river]] ripple and a big [[ocean]] wave. Which is taller? Which do you think carries more energy?</p>'},{tag:'Explain · 10 min',h:'Wave Words',body:'<p>A <b>wave</b> is a repeating up-and-down pattern that carries energy from one place to another. The water or air itself does not travel — only the energy moves.</p><ul class="ico-list"><li>[[wave]] <b>Amplitude</b> — the height of a wave from the middle line to the top. A bigger amplitude means more energy.</li><li>[[river]] <b>Wavelength</b> — the distance from one wave top to the very next wave top.</li><li>[[drum]] Sound waves carry energy through the air from the drum to your [[ear]].</li></ul>'},{tag:'AFL · 5 min',h:'Wave Check',body:'<p>Read each statement below and decide: is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Wave Tasks',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort waves into big amplitude and small amplitude.</li><li>🥈 <b>Silver</b> — Describe a wave using the words amplitude and wavelength.</li><li>🥇 <b>Gold</b> — Compare two waves and explain which carries more energy.</li><li>⭐ <b>G&T</b> — Design your own wave signal code using big and small waves.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>What is the amplitude of a wave?</li><li>If a wave has a bigger amplitude, what does that tell you about its energy?</li></ol>'}],tasks:{bronze:{title:'Bronze — Big or Small Amplitude?',items:['Look at the wave cards below.','Sort each wave into the correct column — big amplitude or small amplitude.'],cards:[{i:'wave',l:'Tall ocean wave'},{i:'ocean',l:'Gentle sea ripple'},{i:'speaker',l:'Loud sound'},{i:'ear',l:'Quiet whisper'},{i:'drum',l:'Hard drum strike'},{i:'river',l:'Slow river ripple'}],columns:['Big Amplitude','Small Amplitude']},silver:{title:'Silver — Describe a Wave',items:['Choose one wave from the picture bank.','Write one sentence about its amplitude and one sentence about its wavelength.'],bank:['wave','ocean','speaker','drum'],question:'My wave description using amplitude and wavelength:'},gold:{title:'Gold — Compare Two Waves',items:['Read the description of each wave in the table.','Fill in the amplitude and wavelength columns.','Write which wave carries more energy and explain why.'],table:{cols:['Wave','Amplitude','Wavelength','Which carries more energy?'],rows:[{label:'Wave A — very tall peaks close together'},{label:'Wave B — short peaks far apart'}]}},gt:{title:'G&T Challenge — Design a Wave Signal Code',items:['Think about how a big-amplitude wave and a small-amplitude wave could stand for different messages.','Create a wave signal code: decide what big amplitude means and what small amplitude means.','Write a short message using your code and show it to a partner.'],question:'My wave signal code key and a message written in it:'}},assessment:{title:'Lesson 1 — Assessment',pics:['wave','speaker','ocean'],items:['1. Name the two measurements we use to describe a wave.','2. What does amplitude tell us about a wave?','3. Look at two waves — which one carries more energy and how do you know?'],check:['I can name the parts of a wave including amplitude and wavelength.','I can explain how the amplitude of a wave relates to the amount of energy it carries.','I can compare two waves and describe which carries more energy and why.']}},{id:'g4wb',title:'Lesson 2: Light, Seeing and Sending Messages',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that we see objects when light reflects off them into our eyes, and that patterns can send information.',sc:[{band:'Remembering',items:['I can name sources of light and explain what the word reflect means.']},{band:'Understanding',items:['I can explain how we see objects using light and reflection.']},{band:'Applying',items:['I can describe how a pattern of signals can send information over a distance.']}],vocab:['Light','Reflect','Pattern','Information'],slides:[{tag:'Engage · 10 min',h:'How Do We See?',body:'<p>Look at these light sources:</p><ul class="ico-list"><li>[[sun]] the sun · [[bulb]] a light bulb · [[flashlight]] a torch</li></ul><p><b>Ask:</b> Could you see this page in a completely dark room? Why not? Where does the light come from that lets you see things around you?</p>'},{tag:'Explore · 15 min',h:'Light and Seeing',body:'<p>Try these observations with a partner:</p><ul><li>Shine a [[flashlight]] at a white wall — you can see the wall because light bounces off it and into your [[eye]].</li><li>The [[moon]] looks bright at night but it is not a light source — it reflects light from the [[sun]].</li><li>Cover the torch with dark cloth — what happens to the objects you could see?</li></ul><p>Discuss: what do all visible objects have in common?</p>'},{tag:'Explain · 10 min',h:'Light, Reflection and Messages',body:'<p>Light travels in straight lines from a <b>light source</b> such as the [[sun]] or a [[bulb]]. We see an object only when light <b>reflects</b> (bounces) off it into our [[eye]]. In complete darkness there is no light to reflect, so we cannot see anything.</p><p>People send <b>information</b> using <b>patterns</b> — a repeating set of signals: [[drum]] beats, flashes of light such as Morse code, and the digital code of 0s and 1s that [[tv]] screens, phones and computers use every second.</p>'},{tag:'AFL · 5 min',h:'Light and Patterns Check',body:'<p>Read each statement below and decide: is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Light and Message Tasks',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort each item into light source or reflects light.</li><li>🥈 <b>Silver</b> — Explain in your own words how you see a book on a desk.</li><li>🥇 <b>Gold</b> — Compare two ways of sending information using patterns.</li><li>⭐ <b>G&T</b> — Design your own light-flash code to send a secret message.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Why can we not see objects in a completely dark room?</li><li>Name one way people use patterns to send information over a distance.</li></ol>'}],tasks:{bronze:{title:'Bronze — Light Source or Reflects Light?',items:['Look at the cards below.','Sort each one into the correct column — light source or reflects light.','Remember: a light source makes its own light; other objects only reflect light.'],cards:[{i:'sun',l:'Sun'},{i:'moon',l:'Moon'},{i:'bulb',l:'Light bulb'},{i:'flashlight',l:'Torch'},{i:'star',l:'Star'},{i:'glass',l:'Mirror'}],columns:['Light Source','Reflects Light']},silver:{title:'Silver — How Do We See?',items:['Think about a book sitting on a desk in a lit room.','Write out the steps that let you see the book — start from the light source.'],bank:['sun','bulb','flashlight','eye'],question:'My step-by-step explanation of how we see the book:'},gold:{title:'Gold — Compare Two Message Systems',items:['Read the two information systems in the table.','Fill in the missing details.','Write which system can send more information quickly and explain why.'],table:{cols:['System','Signal used','Pattern type','How fast?'],rows:[{label:'Morse code — flashes of light'},{label:'Digital code — 0s and 1s in a computer'}]}},gt:{title:'G&T Challenge — Design a Light-Flash Code',items:['Create a code where short flashes and long flashes stand for letters or words.','Write out your code key clearly.','Use your code to send a short message to a partner and see if they can decode it.'],question:'My light-flash code key and a sample encoded message:'}},assessment:{title:'Lesson 2 — Assessment',pics:['sun','eye','drum'],items:['1. Name two sources of light.','2. Explain how we see a chair sitting in a lit room.','3. Describe one way people use patterns to send information over a distance.'],check:['I can name sources of light and explain what the word reflect means.','I can explain how we see objects using light and reflection.','I can describe how a pattern of signals can send information over a distance.']}}]}]},
  {n:3,id:'g4ls',title:'Structures and Senses',live:true,standards:[{n:1,text:'Construct an argument that plants and animals have internal and external structures that function to support survival, growth, behaviour and reproduction, and that animals receive information through their senses, process it in their brain, and respond. (4-LS1)',lessons:[{id:'g4la',title:'Lesson 1: Body Structures for Survival',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that plants and animals have internal and external structures that help them survive, grow and reproduce.',sc:[{band:'Remembering',items:['I can name internal and external structures of plants and animals.']},{band:'Understanding',items:['I can explain the job of a body structure.']},{band:'Applying',items:['I can match a structure to the survival need it meets.']}],vocab:['Structure','External','Internal','Survive'],slides:[{tag:'Engage · 10 min',h:'What do body parts do?',body:'<p>Look at these living things:</p><ul class="ico-list"><li>[[cactus]] cactus · [[fish]] fish · [[fox]] fox · [[tree]] tree</li></ul><p>A cactus has sharp spines. A fish has fins. A fox has thick fur. A tree has deep roots.</p><p><b>Ask:</b> Why do they have these parts? What job does each part do to help the organism survive?</p>'},{tag:'Explore · 15 min',h:'Inside and Outside',body:'<p>Some body parts are on the <b>outside</b> of an organism — you can see and touch them. Others are on the <b>inside</b> — hidden and protected.</p><ul class="ico-list"><li>[[leaf]] leaf · [[feather]] feathers · [[roots]] roots · [[flower]] flower · [[heart]] heart · [[brain]] brain</li></ul><p>Discuss with a partner: which of these do you think are on the outside and which are on the inside? What does each part do for the living thing?</p>'},{tag:'Explain · 10 min',h:'Structures and Their Jobs',body:'<p>A <b>structure</b> is a body part with a special job. <b>External</b> structures are on the outside — such as thorns, fins, wings, feathers and shells. <b>Internal</b> structures are on the inside — such as the heart, lungs, bones and stomach.</p><ul class="ico-list"><li>[[roots]] roots take in water · [[heart]] the heart pumps blood · [[leaf]] leaves make food · [[feather]] feathers keep birds warm</li></ul><p>These structures help living things <b>survive</b>, grow and reproduce.</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Read each statement and decide: is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Structure Scientist',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort body parts into external and internal.</li><li>🥈 <b>Silver</b> — Explain the job of one external and one internal structure.</li><li>🥇 <b>Gold</b> — Match each structure to the survival need it meets.</li><li>⭐ <b>G&T</b> — Design a new animal and explain how each of its structures helps it survive.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name one external structure and one internal structure.</li><li>What is the job of roots in a plant?</li><li>How do fins help a fish survive?</li></ol>'}],tasks:{bronze:{title:'Bronze — External or Internal?',items:['Cut out the structure cards.','Sort them into EXTERNAL (on the outside) and INTERNAL (on the inside).'],cards:[{i:'leaf',l:'Leaf'},{i:'roots',l:'Roots'},{i:'feather',l:'Feathers'},{i:'flower',l:'Flower'},{i:'heart',l:'Heart'},{i:'brain',l:'Brain'}],columns:['External','Internal']},silver:{title:'Silver — Explain the Job',items:['Choose one external structure and one internal structure.','Write what job each one does for the animal or plant.'],bank:['roots','leaf','heart','feather','flower','fish'],question:'External structure and its job: / Internal structure and its job:'},gold:{title:'Gold — Structure to Survival',items:['Match each structure to the survival need it meets.','Write one sentence to explain your match.'],table:{cols:['Structure','Survival need it meets'],rows:[{icon:'roots',label:'Roots'},{icon:'heart',label:'Heart'},{icon:'feather',label:'Feathers'},{icon:'leaf',label:'Leaf'}]}},gt:{title:'G&T Challenge — Design an Animal',items:['Invent a new animal.','Give it at least two external and one internal structure.','Explain how each structure helps it survive in its habitat.'],question:'My animal design and structure explanations:'}},assessment:{title:'Lesson 1 — Assessment',pics:['roots','heart','feather'],items:['1. Name one external and one internal structure.','2. What is the job of roots in a plant?','3. How does having a heart help an animal survive?'],check:['I can name internal and external structures of plants and animals.','I can explain the job of a body structure.','I can match a structure to the survival need it meets.']}},{id:'g4lb',title:'Lesson 2: Senses and the Brain',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that animals sense the world with sense organs that send signals to the brain, which decides how to respond.',sc:[{band:'Remembering',items:['I can name the five senses and their sense organs.']},{band:'Understanding',items:['I can explain how sense organs send signals to the brain.']},{band:'Applying',items:['I can trace a full sense-to-response sequence for an animal.']}],vocab:['Sense','Signal','Brain','Respond'],slides:[{tag:'Engage · 10 min',h:'How do you know a car is coming?',body:'<p>Imagine you are crossing the road:</p><ul class="ico-list"><li>[[eye]] you see headlights · [[ear]] you hear a horn · [[bell]] the horn rings out!</li></ul><p>Your body collected information — and then something happened. You stepped back to safety.</p><p><b>Ask:</b> How did your body know what to do? What happened between sensing the car and stepping back?</p>'},{tag:'Explore · 15 min',h:'Your Five Senses',body:'<p>Animals gather information using sense organs:</p><ul class="ico-list"><li>[[eye]] eyes — sight · [[ear]] ears — hearing · [[nose]] nose — smell · [[hand]] skin — touch</li></ul><p>Animals also use taste (tongue) to sense food. Each organ collects information from the world.</p><p>Discuss: what do you think happens between sensing something and reacting to it? Who is in charge?</p>'},{tag:'Explain · 10 min',h:'Senses, Signals and the Brain',body:'<p>A <b>sense</b> organ collects information from the world. It sends a <b>signal</b> — like an electrical message — to the <b>brain</b>. The brain processes the information and decides how to <b>respond</b>.</p><p>Example sequences:</p><ul class="ico-list"><li>[[eye]] eyes see a ball → [[brain]] brain decides → [[hand]] hands catch it</li><li>[[ear]] ears hear a horn → [[brain]] brain decides → [[person]] legs step back</li><li>[[nose]] nose smells smoke → [[brain]] brain decides → [[person]] person moves away</li></ul>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Read each statement and decide: is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Sense Detective',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Match each sense to its sense organ.</li><li>🥈 <b>Silver</b> — Describe the pathway from sense organ to brain to response.</li><li>🥇 <b>Gold</b> — Map a full sense-to-response sequence for a dog hearing a sound.</li><li>⭐ <b>G&T</b> — Create a diagram showing how two different senses lead to two different responses.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name two sense organs and the sense each one gives.</li><li>What does the brain do with a signal it receives?</li><li>Describe one full sense-to-response sequence in your own words.</li></ol>'}],tasks:{bronze:{title:'Bronze — Match Sense to Organ',items:['Read the sense on each card.','Sort each sense into the correct sense organ column.'],cards:[{i:'eye',l:'Sight'},{i:'ear',l:'Hearing'},{i:'nose',l:'Smell'},{i:'hand',l:'Touch'}],columns:['Eyes','Ears','Nose','Skin']},silver:{title:'Silver — Signal Pathway',items:['Choose a sense organ.','Write the full pathway: sense organ detects something — signal travels to brain — brain decides — body responds.'],bank:['eye','ear','nose','hand','brain'],question:'My sense organ, signal, brain decision and response:'},gold:{title:'Gold — Sense-to-Response Map',items:['A dog hears a strange sound.','Fill in the table to show the full sequence.','Add a second example using a different sense.'],table:{cols:['Sense organ','Signal sent to brain','Brain decision','Response'],rows:[{icon:'ear',label:'Ears (dog hears a sound)'},{icon:'eye',label:'Eyes (person sees a ball)'}]}},gt:{title:'G&T Challenge — Two Senses Diagram',items:['Choose two different senses.','Create a diagram showing the full pathway for each: sense organ — signal — brain — response.','Explain how the brain handles information from more than one sense at a time.'],question:'My two-sense diagram and explanation:'}},assessment:{title:'Lesson 2 — Assessment',pics:['eye','ear','brain'],items:['1. Name two sense organs and the sense each one gives.','2. What is a signal?','3. Describe a full sense-to-response sequence.'],check:['I can name the five senses and their sense organs.','I can explain how sense organs send signals to the brain.','I can trace a full sense-to-response sequence for an animal.']}}]}]},
  {n:4,id:'g4es',title:'Earth Surface and History',live:true,standards:[{n:1,text:'Identify evidence from patterns in rock formations and fossils in rock layers to support an explanation for changes in a landscape over time, and make observations and measurements to provide evidence of the effects of weathering and the rate of erosion. (4-ESS1, 4-ESS2)',lessons:[{id:'g4sa',title:'Lesson 1: Rock Layers and Fossils',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that rock layers and the fossils in them are evidence of Earth history and how environments have changed.',sc:[{band:'Remembering',items:['I can name what rock layers and fossils are.']},{band:'Understanding',items:['I can explain how rock layers show Earth history.']},{band:'Applying',items:['I can use fossil evidence to describe how an environment has changed.']}],vocab:['Layer','Fossil','Evidence','History'],slides:[{tag:'Engage · 10 min',h:'What story do rocks tell?',body:'<p>Look at these clues from the Earth:</p><ul class="ico-list"><li>[[rock]] rock layers · [[fossil]] fossil · [[mountain]] mountain · [[ocean]] ocean</li></ul><p><b>Ask:</b> What can rocks and fossils tell us about the past? Talk with a partner first.</p>'},{tag:'Explore · 15 min',h:'Oldest or Youngest?',body:'<p>Rock layers build up slowly over time. The layer at the bottom formed first — it is the <b>oldest</b>. The layer at the top formed last — it is the <b>youngest</b>.</p><ul class="ico-list"><li>[[rock]] older layers below · [[sand]] newer layers above · [[fossil]] fossils locked inside</li></ul><p>Sort each layer — is it oldest or youngest?</p>'},{tag:'Explain · 10 min',h:'Rock Layers and Fossils',body:'<p>Rock layers form slowly over millions of years. The <b>lowest layer is the oldest</b> and the <b>top layer is the youngest</b>. <b>Fossils</b> are the remains of plants and animals found inside rock. A fossil is <b>evidence</b> of what lived there and what the environment was like. A sea-shell fossil found on a mountain is evidence that the land was once under the sea — Earth <b>history</b> is recorded in rock.</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Think carefully, then judge each statement below.</p>'},{tag:'Elaborate · 10 min',h:'Show What You Know',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Label a diagram of rock layers from oldest to youngest.</li><li>🥈 <b>Silver</b> — Describe what a fossil found in a rock layer tells us about the past.</li><li>🥇 <b>Gold</b> — Use two fossil clues to explain how an environment changed over time.</li><li>⭐ <b>G&T</b> — Design a rock layer diagram and write a full story of Earth history from it.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Which rock layer is the oldest — the top or the bottom?</li><li>What can a fossil tell us about the past?</li><li>A sea-shell fossil is found on a mountain. What does this tell us about Earth history?</li></ol>'}],tasks:{bronze:{title:'Bronze — Label Rock Layers',items:['Look at the rock layer diagram.','Sort the layer cards from oldest at the bottom to youngest at the top.'],cards:[{i:'fossil',l:'Bottom layer — sea fossils'},{i:'rock',l:'Second layer — leaf fossils'},{i:'sand',l:'Third layer — shell pieces'},{i:'crack',l:'Fourth layer — cracked surface'},{i:'mountain',l:'Top layer — mountain rock'}],columns:['Oldest','Youngest']},silver:{title:'Silver — Fossil Evidence',items:['Choose a fossil from the bank.','Write what it tells us about the environment when it lived.'],bank:['fossil','fish','dinosaur','leaf'],question:'My fossil and what it tells us about the past:'},gold:{title:'Gold — Rock Layer Record',items:['Complete the table for each rock layer.','Use what you know about fossils and environments.'],table:{cols:['Rock layer','Fossil found','Environment at that time'],rows:[{label:'Bottom layer'},{label:'Middle layer'},{label:'Top layer'}]}},gt:{title:'G&T Challenge — Earth History Story',items:['Draw or describe four rock layers.','Include a different fossil in each layer.','Write the full story of how this landscape changed over millions of years.'],question:'My Earth history story:'}},assessment:{title:'Lesson 1 — Assessment',pics:['rock','fossil','mountain'],items:['1. Which rock layer is the oldest — the top or the bottom?','2. What does a fossil tell us about the past?','3. A sea-shell fossil is found on a mountain. What does this tell us about Earth history?'],check:['I can name what rock layers and fossils are.','I can explain how rock layers show Earth history.','I can use fossil evidence to describe how an environment has changed.']}},{id:'g4sb',title:'Lesson 2: Weathering and Erosion',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that water, ice, wind and living things slowly break down rock (weathering) and carry it away (erosion), shaping the land.',sc:[{band:'Remembering',items:['I can define weathering and erosion.']},{band:'Understanding',items:['I can explain how water, wind and ice shape the land.']},{band:'Applying',items:['I can use a map to identify land features shaped by weathering and erosion.']}],vocab:['Weathering','Erosion','River','Map'],slides:[{tag:'Engage · 10 min',h:'How does rock change shape?',body:'<p>These forces shape the land every day:</p><ul class="ico-list"><li>[[rain]] rain · [[wind]] wind · [[river]] river · [[glacier]] glacier</li></ul><p><b>Ask:</b> How can water and wind change the shape of rocks and land over a very long time? Share your ideas.</p>'},{tag:'Explore · 15 min',h:'Breaking Down or Carrying Away?',body:'<p>Two things happen to rock over time:</p><ul class="ico-list"><li>[[crack]] weathering — breaking rock down · [[sand]] erosion — carrying pieces away</li></ul><p><b>Sort each example</b> — is it WEATHERING (breaking rock apart) or EROSION (moving pieces to a new place)?</p>'},{tag:'Explain · 10 min',h:'Weathering and Erosion',body:'<p><b>Weathering</b> is when wind, water, ice and plant roots slowly break rock into smaller and smaller pieces. <b>Erosion</b> is when water, wind and ice carry those pieces away to a new place. Rivers carve valleys, ocean waves wear away cliffs, and glaciers scrape the land. These changes happen slowly over a very long time. We use <b>maps</b> to show Earth features such as mountains, rivers and coastlines.</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Think carefully, then judge each statement below.</p>'},{tag:'Elaborate · 10 min',h:'Show What You Know',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort examples into weathering and erosion.</li><li>🥈 <b>Silver</b> — Describe how a river shapes the land over time.</li><li>🥇 <b>Gold</b> — Compare the rate of weathering in different conditions and record measurements.</li><li>⭐ <b>G&T</b> — Design a study to measure how fast water erodes soil and predict what a landscape will look like in 1000 years.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>What is the difference between weathering and erosion?</li><li>Name two forces that cause weathering.</li><li>How does a river shape the land over time?</li></ol>'}],tasks:{bronze:{title:'Bronze — Weathering or Erosion?',items:['Cut out the cards.','Sort them into WEATHERING and EROSION.'],cards:[{i:'crack',l:'Plant roots crack rock'},{i:'rain',l:'Rain breaks rock down'},{i:'river',l:'River carries sand away'},{i:'wind',l:'Wind blows dust to a new place'},{i:'glacier',l:'Ice grinds rock into powder'},{i:'ocean',l:'Waves move pebbles along the shore'}],columns:['Weathering','Erosion']},silver:{title:'Silver — How Does a River Shape Land?',items:['Choose a landform from the bank.','Write how water shaped it over a long time.'],bank:['river','mountain','ocean','sand','rock'],question:'My landform and how water shaped it:'},gold:{title:'Gold — Rate of Erosion',items:['Think about what makes erosion faster or slower.','Complete the table with your predictions and reasons.'],table:{cols:['Condition','Fast or slow erosion?','Reason'],rows:[{label:'Steep slope and heavy rain'},{label:'Flat land and light rain'},{label:'Strong wind on bare sand'},{label:'Wind in a thick forest'}]}},gt:{title:'G&T Challenge — Predict the Future Landscape',items:['Choose a river near a mountain.','Describe how weathering and erosion will change the landscape in 1000 years.','Draw a map sketch to show before and after.'],question:'My prediction and map sketch:'}},assessment:{title:'Lesson 2 — Assessment',pics:['river','mountain','map'],items:['1. What is weathering?','2. How does a river change the landscape over time?','3. Look at the map. Name one feature shaped by weathering or erosion.'],check:['I can define weathering and erosion.','I can explain how water, wind and ice shape the land.','I can use a map to identify land features shaped by weathering and erosion.']}}]}]},
  {n:5,id:'g4nr',title:'Natural Resources and Hazards',live:true,standards:[{n:1,text:'Obtain and combine information to describe that energy and fuels are derived from natural resources and their use affects the environment, and generate and compare solutions to reduce the impacts of natural Earth processes (hazards) on humans. (4-ESS3)',lessons:[{id:'g4na',title:'Lesson 1: Energy and Natural Resources',grade:'Grade 4 · 50 min · 5E',lo:'We are learning that the energy and fuels people use come from natural resources, and that using them affects the environment.',sc:[{band:'Remembering',items:['I can name renewable and non-renewable natural resources.']},{band:'Understanding',items:['I can explain how using non-renewable fuels affects the environment.']},{band:'Applying',items:['I can suggest ways to reduce the impact of using natural resources.']}],vocab:['Resource','Renewable','Pollution','Recycle'],slides:[{tag:'Engage · 10 min',h:'Where Does Our Energy Come From?',body:'<p>Everything we do uses energy. Think about where it comes from:</p><ul class="ico-list"><li>[[sun]] sunlight · [[wind]] wind · [[river]] moving water · [[fuel]] coal and oil</li></ul><p><b>Ask:</b> Which of these do you think will last forever? Which will one day run out?</p>'},{tag:'Explore · 15 min',h:'Renewable or Non-Renewable?',body:'<p>Sort these energy sources — will they run out, or does nature keep replacing them?</p><ul class="ico-list"><li>[[sun]] Sunlight · [[wind]] Wind · [[river]] Moving water · [[fuel]] Coal · [[factory]] Oil and gas</li></ul><p>Drag each one into the correct group: <b>Renewable</b> or <b>Non-Renewable</b>.</p>'},{tag:'Explain · 10 min',h:'Energy and Natural Resources',body:'<p>A <b>resource</b> is something from Earth that people use. Energy comes from two kinds of natural resource:</p><ul class="ico-list"><li>[[sun]] <b>Renewable</b>: sunlight, wind and moving water are replaced by nature and will not run out</li><li>[[fuel]] <b>Non-renewable</b>: coal, oil and gas took millions of years to form underground and will run out</li><li>[[factory]] Burning fuels releases <b>pollution</b> that harms the air and water</li><li>[[recycle]] We can <b>recycle</b>, reduce and reuse to protect our resources</li></ul>'},{tag:'AFL · 5 min',h:'Check Your Understanding',body:'<p>Read each statement and decide: is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Resource Challenge',body:'<p>Show what you know about natural resources — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort energy sources into Renewable and Non-Renewable.</li><li>🥈 <b>Silver</b> — Explain how burning a fuel affects the environment.</li><li>🥇 <b>Gold</b> — Compare two energy sources using a table.</li><li>⭐ <b>G&T</b> — Design a plan to reduce non-renewable energy use at school.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name two renewable and two non-renewable natural resources.</li><li>Explain what pollution is and how burning fuels causes it.</li></ol>'}],tasks:{bronze:{title:'Bronze — Renewable or Non-Renewable?',items:['Look at each energy source card.','Sort them into Renewable and Non-Renewable.'],cards:[{i:'sun',l:'Sunlight'},{i:'wind',l:'Wind'},{i:'river',l:'Moving water'},{i:'turbine',l:'Hydropower'},{i:'fuel',l:'Coal'},{i:'factory',l:'Oil and gas'}],columns:['Renewable','Non-Renewable']},silver:{title:'Silver — Energy and the Environment',items:['Choose a non-renewable fuel from the picture bank.','Write how using it affects the environment.'],bank:['fuel','factory','litter','tree','recycle'],question:'The fuel I chose and how it affects the environment:'},gold:{title:'Gold — Compare Energy Sources',items:['Fill in the table to compare energy sources.','Include: where it comes from, will it run out, and does it cause pollution.'],table:{cols:['Energy source','Where it comes from','Will it run out?','Causes pollution?'],rows:[{label:'Sunlight'},{label:'Wind'},{label:'Coal'},{label:'Oil'}]}},gt:{title:'G&T Challenge — Energy Action Plan',items:['Think about energy use at your school.','Suggest three ways to reduce the use of non-renewable energy.','Explain the benefit of each idea.'],question:'My three ideas to reduce non-renewable energy use at school:'}},assessment:{title:'Lesson 1 — Assessment',pics:['sun','fuel','recycle'],items:['1. Name two renewable and two non-renewable natural resources.','2. What is pollution and what causes it?','3. Suggest one way people can protect natural resources.'],check:['I can name renewable and non-renewable natural resources.','I can explain how using non-renewable fuels affects the environment.','I can suggest ways to reduce the impact of using natural resources.']}},{id:'g4nb',title:'Lesson 2: Natural Hazards and Staying Safe',grade:'Grade 4 · 50 min · 5E',lo:'We are learning about natural hazards and how engineers design solutions to reduce their impacts.',sc:[{band:'Remembering',items:['I can name different types of natural hazard.']},{band:'Understanding',items:['I can explain how engineers design solutions to reduce the harm from natural hazards.']},{band:'Applying',items:['I can compare engineering solutions for protecting people from a natural hazard.']}],vocab:['Hazard','Earthquake','Flood','Engineer'],slides:[{tag:'Engage · 10 min',h:'Forces of Nature',body:'<p>Nature has incredible power. Some of that power can be very dangerous:</p><ul class="ico-list"><li>[[volcano]] volcano · [[crack]] earthquake · [[rain]] flood · [[tornado]] tornado · [[ocean]] tsunami</li></ul><p><b>Ask:</b> Have you ever seen a natural hazard in the news? What happened and who helped the people affected?</p>'},{tag:'Explore · 15 min',h:'What Kind of Hazard Is It?',body:'<p>Classify these events — are they <b>Earth hazards</b>, <b>water hazards</b> or <b>weather hazards</b>?</p><ul class="ico-list"><li>[[volcano]] volcanic eruption · [[crack]] earthquake · [[river]] flood · [[ocean]] tsunami · [[lightning]] severe storm · [[tornado]] tornado</li></ul><p>Drag each event into the correct group.</p>'},{tag:'Explain · 10 min',h:'Natural Hazards and Engineering Solutions',body:'<p>A <b>hazard</b> is a dangerous natural event. We cannot stop them, but <b>engineers</b> design solutions to reduce the harm:</p><ul class="ico-list"><li>[[crack]] <b>Earthquake</b>: earthquake-proof buildings and early-warning systems</li><li>[[river]] <b>Flood</b>: dams and flood barriers keep rising water away from homes</li><li>[[ocean]] Tsunami: sea walls and evacuation plans save lives</li><li>[[lightning]] Severe storms: storm shelters and warning systems keep people safe</li></ul>'},{tag:'AFL · 5 min',h:'Check Your Understanding',body:'<p>Read each statement and decide: is it true or false?</p>'},{tag:'Elaborate · 10 min',h:'Hazard Engineer',body:'<p>Be a hazard engineer — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort cards into Natural Hazards and Engineering Solutions.</li><li>🥈 <b>Silver</b> — Describe one engineering solution for a hazard you choose.</li><li>🥇 <b>Gold</b> — Compare two engineering solutions using a table.</li><li>⭐ <b>G&T</b> — Design a safety plan for a coastal town at risk of floods and tsunamis.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name three types of natural hazard.</li><li>Explain one engineering solution that helps protect people from floods.</li></ol>'}],tasks:{bronze:{title:'Bronze — Hazard or Solution?',items:['Sort each card into the correct group.','Is it a natural hazard or an engineering solution?'],cards:[{i:'crack',l:'Earthquake'},{i:'river',l:'Flood'},{i:'ocean',l:'Tsunami'},{i:'mountain',l:'Sea wall'},{i:'turbine',l:'Early-warning system'},{i:'volcano',l:'Volcanic eruption'}],columns:['Natural Hazard','Engineering Solution']},silver:{title:'Silver — Engineer a Solution',items:['Choose a natural hazard from the picture bank.','Describe one engineering solution that reduces the harm it causes.'],bank:['volcano','crack','rain','ocean','tornado'],question:'My chosen hazard and the engineering solution:'},gold:{title:'Gold — Hazard Solutions Table',items:['Complete the table for three different natural hazards.','For each one write what it does and one engineering solution.'],table:{cols:['Natural hazard','What it does','Engineering solution'],rows:[{icon:'crack',label:'Earthquake'},{icon:'river',label:'Flood'},{icon:'ocean',label:'Tsunami'}]}},gt:{title:'G&T Challenge — Coastal Safety Plan',items:['A coastal town is at risk from floods and tsunamis.','Design a safety plan for the town.','Include at least three engineering solutions and explain why each one helps.'],question:'My coastal town safety plan:'}},assessment:{title:'Lesson 2 — Assessment',pics:['volcano','rain','mountain'],items:['1. Name three types of natural hazard.','2. What does an engineer do to help reduce the impact of a natural hazard?','3. Describe one engineering solution that protects people from floods.'],check:['I can name different types of natural hazard.','I can explain how engineers design solutions to reduce the harm from natural hazards.','I can compare engineering solutions for protecting people from a natural hazard.']}}]}]}
