const GRADE3=[
  {n:1,id:'g3for',title:'Forces and Motion',live:true,standards:[{n:1,text:'Plan and conduct investigations to provide evidence of the effects of balanced and unbalanced forces on the motion of an object, and observe and measure an object motion to predict future motion. (3-PS2)',lessons:[{id:'g3fa',title:'Lesson 1: Balanced and Unbalanced Forces',grade:'Grade 3 · 50 min · 5E',lo:'We are learning to explain how balanced and unbalanced forces change the motion of an object.',sc:[{band:'Remembering',items:['I can define a force as a push or a pull.']},{band:'Understanding',items:['I can explain the difference between balanced and unbalanced forces.']},{band:'Applying',items:['I can predict how unbalanced forces will change the motion of an object.']}],vocab:['Force','Balanced','Unbalanced','Motion'],slides:[{tag:'Engage · 10 min',h:'What is a Force?',body:'<p>Everything that moves gets a push or a pull. That push or pull is called a <b>force</b>!</p><ul class="ico-list"><li>[[cart]] pulled across the floor · [[kite]] pushed by the wind · [[ball]] kicked into the air</li></ul><p><b>Ask:</b> Can you think of a push force and a pull force you do every day?</p>'},{tag:'Explore · 15 min',h:'Push or Pull?',body:'<p>Look at each action below. Decide whether it is a <b>push</b> or a <b>pull</b>.</p><ul class="ico-list"><li>[[football]] kicking a ball · [[bike]] pedalling forward · [[kite]] flying a kite · [[cart]] pulling a cart</li></ul><p>Sort your cards into two groups and share your thinking with a partner.</p>'},{tag:'Explain · 10 min',h:'Balanced and Unbalanced Forces',body:'<p>A <b>force</b> is a push or a pull. Forces can start, stop, speed up, slow down or change the direction of motion.</p><p>When two equal forces act in opposite directions the forces are <b>balanced</b> — the object does not change its motion. When one force is bigger the forces are <b>unbalanced</b> — the object changes its motion.</p><ul class="ico-list"><li>[[scale]] equal weights — balanced · [[person]] one side wins — unbalanced</li></ul>'},{tag:'AFL · 5 min',h:'Force Check',body:'<p>Think about each statement. Give a thumbs up for True and a thumbs down for False.</p>'},{tag:'Elaborate · 10 min',h:'Force Challenge',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort actions into push or pull.</li><li>🥈 <b>Silver</b> — Describe what happens when forces are balanced or unbalanced.</li><li>🥇 <b>Gold</b> — Complete a force prediction table and explain your reasoning.</li><li>⭐ <b>G&T</b> — Design your own tug-of-war investigation and explain what makes it a fair test.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>What is a force? Give one example.</li><li>What happens to an object when forces on it are unbalanced?</li><li>Give one example of balanced forces in real life.</li></ol>'}],tasks:{bronze:{title:'Bronze — Push or Pull?',items:['Look at each action card.','Sort each card into PUSH or PULL.'],cards:[{i:'football',l:'Kick a ball'},{i:'cart',l:'Pull a cart'},{i:'block',l:'Push a block'},{i:'kite',l:'Fly a kite'},{i:'bike',l:'Pedal a bike'},{i:'person',l:'Pull open a door'}],columns:['Push','Pull']},silver:{title:'Silver — Balanced or Unbalanced?',items:['Look at each picture.','Write whether the forces are balanced or unbalanced.','Write what you think will happen to the object.'],bank:['scale','cart','ball','person'],question:'My explanation of balanced and unbalanced forces:'},gold:{title:'Gold — Force Prediction Table',items:['Read each scenario.','Decide if the forces are balanced or unbalanced.','Predict what will happen to the object.'],table:{cols:['Scenario','Balanced or Unbalanced?','What happens?'],rows:[{label:'Two people push a box equally from each side'},{label:'One person pushes a cart and nobody pushes back'},{label:'Two teams pull a rope with equal force'},{label:'A bigger team pulls harder in tug of war'}]}},gt:{title:'G&T Challenge — Design an Investigation',items:['Plan a tug-of-war test using two teams of different sizes.','Write what you predict will happen and why.','Explain how you will make it a fair test.'],question:'My investigation plan and prediction:'}},assessment:{title:'Lesson 1 — Assessment',pics:['cart','scale','ball'],items:['1. What is a force? Give one example.','2. What happens to an object when forces on it are balanced?','3. What happens when forces on an object are unbalanced?'],check:['I can define a force as a push or a pull.','I can explain the difference between balanced and unbalanced forces.','I can predict how unbalanced forces will change the motion of an object.']}},{id:'g3fb',title:'Lesson 2: Magnets and Forces at a Distance',grade:'Grade 3 · 50 min · 5E',lo:'We are learning that magnets can push and pull without touching, and that some materials are magnetic.',sc:[{band:'Remembering',items:['I can name materials that a magnet attracts.']},{band:'Understanding',items:['I can explain how like poles repel and opposite poles attract.']},{band:'Applying',items:['I can predict whether a magnet will attract or repel another magnet.']}],vocab:['Magnet','Attract','Repel','Magnetic'],slides:[{tag:'Engage · 10 min',h:'Magic Pull!',body:'<p>Hold a magnet close to a paperclip — it flies through the air without being touched!</p><ul class="ico-list"><li>[[magnet]] the magnet · [[paperclip]] the paperclip · [[compass]] a compass</li></ul><p><b>Ask:</b> How can something move toward a magnet without being touched? What do you think is happening?</p>'},{tag:'Explore · 15 min',h:'Magnetic or Not?',body:'<p>Test each object with a magnet. Does the magnet attract it or not?</p><ul class="ico-list"><li>[[paperclip]] paperclip · [[spoon]] metal spoon · [[foil]] aluminium foil · [[block]] wooden block · [[bottle]] plastic bottle · [[cloth]] fabric</li></ul><p>Record your results in a table: attracted or not attracted?</p>'},{tag:'Explain · 10 min',h:'How Magnets Work',body:'<p>A <b>magnet</b> can push or pull another magnet or a magnetic material <b>without touching</b> — this is called a force at a distance.</p><p>Magnets attract materials made of iron or steel. They do not attract wood, plastic or fabric.</p><p>Every magnet has two poles — north and south. Like poles <b>repel</b> each other. Opposite poles attract each other.</p><ul class="ico-list"><li>[[compass]] A compass has a small magnet that always points north.</li></ul>'},{tag:'AFL · 5 min',h:'Magnet Check',body:'<p>Think about each statement. Give a thumbs up for True and a thumbs down for False.</p>'},{tag:'Elaborate · 10 min',h:'Magnet Challenge',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort objects into magnetic and not magnetic.</li><li>🥈 <b>Silver</b> — Test objects and record what a magnet attracts.</li><li>🥇 <b>Gold</b> — Predict what happens for each magnet pole combination.</li><li>⭐ <b>G&T</b> — Investigate how magnet strength changes with distance and describe the pattern you find.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name one material a magnet attracts and one it does not attract.</li><li>What happens when two north poles of a magnet are pushed together?</li><li>What is a force at a distance?</li></ol>'}],tasks:{bronze:{title:'Bronze — Magnetic or Not?',items:['Look at each object card.','Sort each card into MAGNETIC or NOT MAGNETIC.'],cards:[{i:'paperclip',l:'Paperclip'},{i:'spoon',l:'Metal spoon'},{i:'block',l:'Wooden block'},{i:'bottle',l:'Plastic bottle'},{i:'foil',l:'Aluminium foil'},{i:'cloth',l:'Fabric'}],columns:['Magnetic','Not Magnetic']},silver:{title:'Silver — What Does a Magnet Attract?',items:['Look at each object in the bank.','Test it with a magnet if you can.','Write whether the magnet attracted it and why you think so.'],bank:['paperclip','spoon','block','bottle'],question:'My observations — which objects the magnet attracted and which it did not:'},gold:{title:'Gold — Poles Prediction Table',items:['Read each pole combination.','Predict whether the magnets will attract or repel.','Write your reasoning.'],table:{cols:['Pole combination','Attract or Repel?','My reasoning'],rows:[{label:'North pole + North pole'},{label:'South pole + South pole'},{label:'North pole + South pole'},{label:'South pole + North pole'}]}},gt:{title:'G&T Challenge — Distance Investigation',items:['Place a magnet at different distances from a paperclip.','Record the furthest distance at which it still attracts the paperclip.','Describe the pattern you notice as the magnet moves further away.'],question:'My results and the pattern I noticed:'}},assessment:{title:'Lesson 2 — Assessment',pics:['magnet','paperclip','compass'],items:['1. Name one material a magnet attracts and one it does not attract.','2. What does repel mean?','3. What is a force at a distance?'],check:['I can name materials that a magnet attracts.','I can explain how like poles repel and opposite poles attract.','I can predict whether a magnet will attract or repel another magnet.']}}]}]},
  {n:2,id:'g3life',title:'Life Cycles and Traits',live:true,standards:[{n:1,text:'Develop models to describe that organisms have unique and diverse life cycles but all have in common birth, growth, reproduction, and death, and provide evidence that traits are inherited from parents and can be influenced by the environment. (3-LS1, 3-LS3)',lessons:[{id:'g3la',title:'Lesson 1: Life Cycles',grade:'Grade 3 · 50 min · 5E',lo:'We are learning to describe the life cycles of plants and animals: birth, growth, reproduction and death.',sc:[{band:'Remembering',items:['I can name the four stages all life cycles share.']},{band:'Understanding',items:['I can describe the life cycle of a butterfly, frog or plant.']},{band:'Applying',items:['I can put the stages of a life cycle in the correct order.']}],vocab:['Life Cycle','Growth','Reproduction','Adult'],slides:[{tag:'Engage · 10 min',h:'How do living things change?',body:'<p>Look at these living things at different stages:</p><ul class="ico-list"><li>[[egg]] egg · [[caterpillar]] caterpillar · [[butterfly]] adult butterfly</li><li>[[egg]] egg · [[tadpole]] tadpole · [[frog]] adult frog</li></ul><p><b>Ask:</b> What do you notice? How do these living things change as they grow? What do they all have in common?</p>'},{tag:'Explore · 15 min',h:'Spot the Stages',body:'<p>Look at these life cycle diagrams. Find the stages in each one:</p><ul class="ico-list"><li>[[seed]] seed → [[sapling]] seedling → [[plant]] adult plant → [[flower]] makes seeds</li><li>[[egg]] egg → [[caterpillar]] caterpillar → pupa → [[butterfly]] adult butterfly</li><li>[[egg]] egg → [[tadpole]] tadpole → [[frog]] adult frog</li></ul><p>What stages do all three life cycles share?</p>'},{tag:'Explain · 10 min',h:'Life Cycles',body:'<p>Every living thing has a <b>life cycle</b> — the stages it goes through from birth to death. All life cycles share four stages: birth, <b>growth</b>, <b>reproduction</b>, and death. Life cycles look different for different organisms but they all share these four stages. A butterfly goes from [[egg]] egg to [[caterpillar]] caterpillar to pupa to [[butterfly]] adult. A plant grows from [[seed]] seed to [[sapling]] seedling to [[plant]] adult plant that makes new seeds.</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Use the widget to judge each statement about life cycles.</p>'},{tag:'Elaborate · 10 min',h:'Life Cycle Challenge',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort life cycle stages into the correct organism.</li><li>🥈 <b>Silver</b> — Write the stages of two different life cycles in the correct order.</li><li>🥇 <b>Gold</b> — Compare the life cycles of a butterfly and a frog in a table.</li><li>⭐ <b>G&T</b> — Design a life cycle diagram for an animal of your choice and explain each stage.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name the four stages all life cycles share.</li><li>What stage comes after the egg in a butterfly life cycle?</li></ol>'}],tasks:{bronze:{title:'Bronze — Sort the Life Cycle Stages',items:['Cut out the stage cards.','Sort each stage card into the correct life cycle column.'],cards:[{i:'caterpillar',l:'Caterpillar'},{i:'tadpole',l:'Tadpole'},{i:'butterfly',l:'Adult Butterfly'},{i:'frog',l:'Adult Frog'},{i:'seed',l:'Seed'},{i:'sapling',l:'Seedling'}],columns:['Butterfly','Frog','Plant']},silver:{title:'Silver — Write the Life Cycle',items:['Choose two organisms from the picture bank.','Write their life cycle stages in the correct order.'],bank:['egg','caterpillar','butterfly','tadpole','frog','seed','sapling','plant'],question:'My two organisms and their life cycle stages in order:'},gold:{title:'Gold — Compare Life Cycles',items:['Fill in the table to compare the butterfly and frog life cycles.','At the bottom, write one thing that is the same and one that is different.'],table:{cols:['Organism','Stage 1','Stage 2','Stage 3','Stage 4'],rows:[{icon:'butterfly',label:'Butterfly'},{icon:'frog',label:'Frog'}]}},gt:{title:'G&T Challenge — Design a Life Cycle',items:['Choose an animal not covered in the lesson.','Draw or describe each stage of its life cycle.','Write one sentence explaining what happens at each stage.'],question:'My animal and its life cycle stages:'}},assessment:{title:'Lesson 1 — Assessment',pics:['butterfly','frog','plant'],items:['1. Name the four stages all life cycles share.','2. Describe the life cycle of a butterfly.','3. How is the life cycle of a frog different from the life cycle of a plant?'],check:['I can name the four stages all life cycles share.','I can describe the life cycle of a butterfly, frog or plant.','I can put the stages of a life cycle in the correct order.']}},{id:'g3lb',title:'Lesson 2: Inherited Traits and the Environment',grade:'Grade 3 · 50 min · 5E',lo:'We are learning to explain that offspring are like their parents but not identical, and that the environment can affect traits.',sc:[{band:'Remembering',items:['I can name examples of inherited traits.']},{band:'Understanding',items:['I can explain how offspring are like their parents but not identical.']},{band:'Applying',items:['I can sort traits into inherited and influenced by the environment.']}],vocab:['Trait','Inherit','Offspring','Environment'],slides:[{tag:'Engage · 10 min',h:'Like parent, like child?',body:'<p>Look at these parent and offspring pairs:</p><ul class="ico-list"><li>[[dog]] parent dog · [[dog]] puppy</li><li>[[chicken]] hen · [[chick]] chick</li><li>[[flower]] parent flower · [[flower]] offspring flower</li></ul><p><b>Ask:</b> What is the same? What is different? Why do you think offspring look like their parents but are not exactly the same?</p>'},{tag:'Explore · 15 min',h:'Inherited or Environment?',body:'<p>Look at these pairs. Which traits are always passed on? Which change depending on conditions?</p><ul class="ico-list"><li>[[cow]] cow · [[cow]] calf — same coat pattern</li><li>[[rabbit]] rabbit · [[rabbit]] young rabbit — same fur colour</li><li>[[plant]] plant with plenty of water · [[wilted]] same plant with little water — same parent, different height</li></ul><p>Can the environment change how a living thing grows?</p>'},{tag:'Explain · 10 min',h:'Traits: Inherited and Environment',body:'<p>A <b>trait</b> is a feature of a living thing — like fur colour, petal colour, or body shape. Offspring receive traits from their parents. We say they <b>inherit</b> those traits. Puppies look like their parents because of inherited traits. But offspring are not exactly the same as each other — they receive a different mix of traits.</p><p>Some traits are shaped by the <b>environment</b>. A [[wilted]] plant with less water grows shorter. An animal with little food grows smaller. These changes are not new inherited traits — the surroundings changed how the organism grew.</p>'},{tag:'AFL · 5 min',h:'True or False?',body:'<p>Use the widget to judge each statement about traits and inheritance.</p>'},{tag:'Elaborate · 10 min',h:'Traits Challenge',body:'<p>Show what you know — open your task sheet:</p><ul><li>🥉 <b>Bronze</b> — Sort each trait into inherited or influenced by the environment.</li><li>🥈 <b>Silver</b> — Describe two traits a puppy inherits from its parent and explain how you know.</li><li>🥇 <b>Gold</b> — Sort six traits and explain one that is influenced by the environment.</li><li>⭐ <b>G&T</b> — Design an experiment to show how the environment affects plant growth.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name one trait a puppy inherits from its parent.</li><li>How can the environment affect the traits of a plant?</li></ol>'}],tasks:{bronze:{title:'Bronze — Inherited or Environment?',items:['Cut out the trait cards.','Sort them into INHERITED or INFLUENCED BY ENVIRONMENT.'],cards:[{i:'dog',l:'Fur colour'},{i:'flower',l:'Flower colour'},{i:'wilted',l:'Plant height (less water)'},{i:'bird',l:'Wing shape'},{i:'cow',l:'Coat pattern'},{i:'plant',l:'Leaf size (poor soil)'}],columns:['Inherited','Influenced by Environment']},silver:{title:'Silver — Describe Inherited Traits',items:['Choose a parent and offspring pair from the picture bank.','Write two traits the offspring inherits from its parent.'],bank:['dog','rabbit','flower','bird','cow'],question:'My parent and offspring pair and the traits that are inherited:'},gold:{title:'Gold — Sort and Explain Traits',items:['Sort each trait into the correct column.','For one environment trait, write a sentence explaining how it is affected.'],table:{cols:['Trait','Inherited or Environment?','Explanation'],rows:[{icon:'dog',label:'Fur colour'},{icon:'flower',label:'Flower colour'},{icon:'wilted',label:'Height with less water'},{icon:'cow',label:'Coat pattern'},{icon:'bird',label:'Wing shape'},{icon:'plant',label:'Leaf size in poor soil'}]}},gt:{title:'G&T Challenge — Environment Experiment',items:['Plan an experiment using two plants of the same type.','Give one plant less water than the other.','Predict what will happen and write an explanation using what you know about traits and the environment.'],question:'My experiment plan and prediction:'}},assessment:{title:'Lesson 2 — Assessment',pics:['dog','flower','plant'],items:['1. Name one trait a puppy inherits from its parent.','2. What does it mean to inherit a trait?','3. Give one example of a trait that is influenced by the environment and explain why.'],check:['I can name examples of inherited traits.','I can explain how offspring are like their parents but not identical.','I can sort traits into inherited and influenced by the environment.']}}]}]},
  {n:3,id:'g3adapt',title:'Survival and Adaptations',live:true,standards:[{n:1,text:'Construct an argument with evidence that in a particular habitat some organisms can survive well, some less well, and some not at all, and use fossils and adaptations as evidence of environments that existed long ago and how environments change. (3-LS4)',lessons:[{id:'g3aa',title:'Lesson 1: Adaptations for Survival',grade:'Grade 3 · 50 min · 5E',lo:'We are learning that living things have adaptations (special body parts and behaviours) that help them survive in their habitat.',sc:[{band:'Remembering',items:['I can name what an adaptation is.']},{band:'Understanding',items:['I can explain how an adaptation helps an animal survive in its habitat.']},{band:'Applying',items:['I can give examples of adaptations for a specific habitat.']}],vocab:['Adaptation','Survive','Habitat','Camouflage'],slides:[{tag:'Engage · 10 min',h:'Can every animal live anywhere?',body:'<p>Look at these animals in their homes:</p><ul class="ico-list"><li>[[camel]] desert · [[polarbear]] icy Arctic · [[duck]] pond · [[fish]] ocean</li></ul><p><b>Ask:</b> Could a polar bear live in the desert? Could a fish live on land? What do you think would happen?</p>'},{tag:'Explore · 15 min',h:'What helps them survive?',body:'<p>Study each living thing and its special features:</p><ul class="ico-list"><li>[[camel]] — humps store fat for energy · long lashes keep sand out of its eyes</li><li>[[polarbear]] — thick fur for warmth · fat layer called blubber under the skin</li><li>[[duck]] — webbed feet for swimming · feathers that keep water out</li><li>[[cactus]] — sharp spines · thick stem stores water for dry times</li><li>[[fish]] — gills to breathe underwater · fins to swim and steer</li><li>[[frog]] — green colour matches leaves · strong back legs for jumping</li></ul><p>Which features help each living thing in its home? Which animal could NOT survive in the desert? Which could NOT survive in a frozen Arctic?</p>'},{tag:'Explain · 10 min',h:'Adaptations and Habitats',body:'<p>An <b>adaptation</b> is a body part or behaviour that helps a living thing <b>survive</b> in its <b>habitat</b>. Each habitat has different conditions, so different adaptations are needed. In one habitat some organisms survive well, some survive less well, and some cannot survive there at all. <b>Camouflage</b> is one kind of adaptation — a colour or pattern that makes an animal hard to see so predators cannot find it.</p>'},{tag:'AFL · 5 min',h:'Is it an adaptation?',body:'<p>Tap True or False for each statement.</p>'},{tag:'Elaborate · 10 min',h:'Show what you know',body:'<p>Open your task sheet and choose your level:</p><ul><li>🥉 <b>Bronze</b> — Sort animals into their correct habitats.</li><li>🥈 <b>Silver</b> — Pick one animal and describe two of its adaptations.</li><li>🥇 <b>Gold</b> — Match each animal to its habitat and explain why each adaptation helps it survive.</li><li>⭐ <b>G&T</b> — Design your own animal for an extreme habitat and explain every adaptation it has.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>Name one adaptation of a camel.</li><li>Why can a fish not survive on land?</li></ol>'}],tasks:{bronze:{title:'Bronze — Sort Animals by Habitat',items:['Look at each animal card.','Sort each animal into the correct habitat column.'],cards:[{i:'camel',l:'Camel'},{i:'cactus',l:'Cactus'},{i:'polarbear',l:'Polar Bear'},{i:'duck',l:'Duck'},{i:'fish',l:'Fish'},{i:'frog',l:'Frog'}],columns:['Desert','Cold Arctic','Water']},silver:{title:'Silver — Describe Adaptations',items:['Choose one animal from the bank.','Write two adaptations it has and explain how each one helps it survive.'],bank:['camel','polarbear','duck','fish','frog'],question:'My animal and its two adaptations:'},gold:{title:'Gold — Animal Adaptation Table',items:['Fill in the table.','For each animal write its habitat and one key adaptation that helps it survive there.'],table:{cols:['Animal','Habitat','Key Adaptation'],rows:[{icon:'camel',label:'Camel'},{icon:'polarbear',label:'Polar Bear'},{icon:'duck',label:'Duck'},{icon:'fish',label:'Fish'}]}},gt:{title:'G&T Challenge — Design Your Own Animal',items:['Choose an extreme habitat such as a hot dry desert or a frozen ocean.','Draw and label your animal.','Write at least three adaptations and explain why each one helps your animal survive there.'],question:'My animal name habitat and adaptations:'}},assessment:{title:'Lesson 1 — Assessment',pics:['camel','polarbear','duck'],items:['1. What is an adaptation?','2. Name two adaptations of a polar bear.','3. Why can a camel survive in the desert when many other animals cannot?'],check:['I can name what an adaptation is.','I can explain how an adaptation helps an animal survive in its habitat.','I can give examples of adaptations for a specific habitat.']}},{id:'g3ab',title:'Lesson 2: Fossils and Changing Environments',grade:'Grade 3 · 50 min · 5E',lo:'We are learning that fossils are evidence of living things from long ago, and that when an environment changes, living things must adapt, move, or die out.',sc:[{band:'Remembering',items:['I can say what a fossil is.']},{band:'Understanding',items:['I can explain what a fossil tells us about past environments.']},{band:'Analysing',items:['I can use fossil evidence to explain how an environment changed over time.']}],vocab:['Fossil','Extinct','Environment','Evidence'],slides:[{tag:'Engage · 10 min',h:'Clues from the past',body:'<p>Look at these amazing finds:</p><ul class="ico-list"><li>[[fossil]] a fern print in rock · [[dinosaur]] giant bones in the ground · [[fish]] a fish shape in stone · [[feather]] a feather pressed into rock</li></ul><p><b>Ask:</b> How did these get inside rock? What can they tell us about what the world was like long ago?</p>'},{tag:'Explore · 15 min',h:'What do fossils tell us?',body:'<p>Study each fossil clue and discuss what it means:</p><ul class="ico-list"><li>[[ocean]] A sea shell fossil found high on a [[mountain]] — was this place once underwater?</li><li>[[fossil]] A fern fossil found in a place that is now cold and icy — was it always this cold?</li><li>[[dinosaur]] Dinosaur bones found all over Earth — these animals lived everywhere and then disappeared</li><li>[[fish]] A fish fossil found in dry desert rock — what does that tell us about this place long ago?</li></ul><p>What do you notice? What questions do you have?</p>'},{tag:'Explain · 10 min',h:'Fossils and Changing Environments',body:'<p>A <b>fossil</b> is the preserved shape or print of a living thing found in rock. Fossils are <b>evidence</b> — proof of what plants and animals lived long ago and what their <b>environment</b> was like. A sea shell fossil on a mountain tells us that place was once underwater. Environments change over time — they get warmer, colder, wetter, or drier. When an environment changes, living things must adapt, move to a new place, or die out and become <b>extinct</b>, like the dinosaurs.</p>'},{tag:'AFL · 5 min',h:'Fossils True or False?',body:'<p>Tap True or False for each statement.</p>'},{tag:'Elaborate · 10 min',h:'Fossil Detective',body:'<p>Open your task sheet and choose your level:</p><ul><li>🥉 <b>Bronze</b> — Match each fossil to what it tells us about the past environment.</li><li>🥈 <b>Silver</b> — Choose one fossil and write what it is evidence of.</li><li>🥇 <b>Gold</b> — Fill in the table linking each fossil to its environment and how the environment changed.</li><li>⭐ <b>G&T</b> — Write a scientific argument: use fossil evidence to explain what a habitat was like long ago and how it changed.</li></ul>'},{tag:'Evaluate · 5 min',h:'Exit Ticket',body:'<ol><li>What is a fossil?</li><li>Scientists find a sea shell fossil on top of a mountain. What does that tell us?</li></ol>'}],tasks:{bronze:{title:'Bronze — Match Fossil to Evidence',items:['Look at each fossil card.','Match each fossil to what it tells us about the environment long ago.'],cards:[{i:'fossil',l:'Fern Fossil'},{i:'ocean',l:'Sea Shell Fossil'},{i:'dinosaur',l:'Dinosaur Bone'},{i:'fish',l:'Fish Fossil'},{i:'leaf',l:'Leaf Fossil'},{i:'feather',l:'Feather in Rock'}],columns:['Lived on land long ago','Lived in water long ago','Lived in a warm forest long ago']},silver:{title:'Silver — Fossil Evidence',items:['Choose a fossil from the bank.','Write what it tells us about the environment long ago.'],bank:['fossil','dinosaur','fish','leaf','ocean'],question:'My fossil and what it tells us about the past environment:'},gold:{title:'Gold — Fossil Evidence Table',items:['Fill in the table for each fossil.','Write what the past environment was like and how it may have changed.'],table:{cols:['Fossil','Past Environment','How it Changed'],rows:[{icon:'ocean',label:'Sea Shell on Mountain'},{icon:'dinosaur',label:'Dinosaur Bone'},{icon:'fossil',label:'Fern in Cold Rock'},{icon:'fish',label:'Fish in Desert Rock'}]}},gt:{title:'G&T Challenge — Fossil Argument',items:['Imagine you are a scientist who found a sea shell fossil on top of a mountain.','Write an argument using the fossil as evidence.','Explain what the habitat was like long ago and what may have caused the environment to change so much.'],question:'My fossil argument using evidence:'}},assessment:{title:'Lesson 2 — Assessment',pics:['fossil','dinosaur','mountain'],items:['1. What is a fossil?','2. What does the word extinct mean?','3. Scientists find a sea shell fossil on a mountain. What does this tell us about how the environment changed?'],check:['I can say what a fossil is.','I can explain what a fossil tells us about past environments.','I can use fossil evidence to explain how an environment changed over time.']}}]}]},
  {n:4,id:'g3weather',title:'Weather and Climate',live:true,standards:[{n:1,text:'Represent data in tables and graphs to describe typical weather conditions and seasons (climate), and design solutions that reduce the impacts of weather-related hazards. (3-ESS2, 3-ESS3)',lessons:[{id:'g3wa',title:'Lesson 1: Weather, Seasons and Climate',grade:'Grade 3 · 50 min · 5E',lo:'We are learning to measure and record the weather, and to describe climate as the typical weather of a place over time.',sc:[{band:'Remembering',items:['I can name the tools we use to measure weather.']},{band:'Understanding',items:['I can explain the difference between weather and climate.']},{band:'Applying',items:['I can record weather data in a table or graph.']}],vocab:['Weather','Climate','Season','Temperature'],slides:[{tag:'Engage · 10 min',h:'What is the weather like today?',body:'<p>Look at these types of weather:</p><ul class="ico-list"><li>[[sun]] sunny · [[rain]] rainy · [[snow]] snowy · [[wind]] windy</li></ul><p><b>Ask:</b> What is the weather like right now? What does the sky look like? Is it warm or cold outside?</p>'},{tag:'Explore · 15 min',h:'Measuring the Weather',body:'<p>Scientists use tools to measure and record the weather:</p><ul class="ico-list"><li>[[thermometer]] thermometer — measures how hot or cold the air is</li><li>[[rain]] rain gauge — measures how much rain has fallen</li><li>[[wind]] wind vane — shows the direction the wind is blowing</li><li>[[graph]] weather chart — records data so we can spot patterns over time</li></ul><p>Record the weather for today in a table. Note the temperature and whether it is sunny, cloudy or rainy.</p>'},{tag:'Explain · 10 min',h:'Weather and Climate Words',body:'<p>These four words help us talk about the weather. Tap each card in the activity to find out what it means:</p><ul class="ico-list"><li>[[cloud]] <b>Weather</b> · [[thermometer]] <b>Temperature</b> · [[sun]] <b>Season</b> · [[graph]] <b>Climate</b></li></ul>'},{tag:'AFL · 5 m function wParticles(host,w){

 g4wa:[{q:'What is a wave?',options:['A ball of water that rolls across the sea','A type of weather system caused by wind','A repeating up-and-down pattern that carries energy','A material that stretches and bends'],answer:2},{q:'Amplitude is ...',options:['the height of a wave from the middle line to the top','the distance from one wave top to the next','the speed at which a wave travels','the amount of water pushed by the wave'],answer:0},{q:'Wavelength is measured from ...',options:['the shore to the middle of the ocean','one wave top to the next wave top','the bottom of one wave to the top of the wave','one wave bottom to the nearest shore'],answer:1},{q:'A wave with a BIGGER amplitude carries ...',options:['less energy than a small wave','the same amount of energy as any wave','no energy at all','more energy than a small wave'],answer:3},{q:'Which TWO statements about water waves are correct?',options:['The water itself travels all the way across the ocean','Waves carry energy but not the water, and a floating duck bobs up and down without moving forward','A floating duck rides the wave all the way to shore','Water waves and sound waves are completely different — sound has no wavelength'],answer:1},{q:'A rubber duck floating on the sea bobs up and down when a wave passes. This shows that ...',options:['the wave carries the duck forward to the shore','waves carry energy but not the water itself','the duck is creating the wave with its movement','the water all moves in the same direction as the wave'],answer:1},{q:'Sound is an example of a wave because it ...',options:['can only travel through solid objects','always travels in a perfectly straight line','carries energy through the air from a source to your ear','stops moving as soon as it leaves the source'],answer:2},{q:'Which TWO objects can make a sound wave when they move?',options:['A hammer hitting a nail and a drum being struck','A shadow on a wall and a reflection in water','A puddle of still water and a heavy rock','A flat sheet of paper and an empty plastic cup'],answer:0},{q:'A loud sound compared to a quiet sound has ...',options:['a shorter wavelength','a smaller amplitude','the same amplitude but travels faster','a bigger amplitude'],answer:3},{q:'Why does a tiny pond ripple carry LESS energy than a large ocean wave?',options:['Because the pond is smaller than the ocean','Because pond ripples do not have a wavelength','Because the pond ripple has a smaller amplitude','Because ocean waves travel at a much faster speed'],answer:2}],
 g4wb:[{q:'How do we see an object on a table?',options:['Our eyes send out light rays that touch the object','Light from a source hits the object and reflects into our eyes','The object gives off its own glow so we notice it','Darkness around the object makes it stand out to our eyes'],answer:1},{q:'Which of these is a LIGHT SOURCE?',options:['The moon','A mirror hanging on a wall','The sun','A white painted wall'],answer:2},{q:'In a room that is completely dark with no light at all, you would ...',options:['still be able to see bright colours clearly','be able to make out outlines but not colours','be able to see everything as normal','not be able to see anything at all'],answer:3},{q:'When light bounces off a surface we say it ...',options:['absorbs into the surface','reflects off the surface','refracts through the surface','dissolves into the surface'],answer:1},{q:'Which TWO of these are light sources?',options:['A torch and the sun','The moon and a mirror','A glass window and a white wall','A wooden chair and an open book'],answer:0},{q:'Morse code sends information using ...',options:['a pattern of long and short flashes or sound signals','a pattern of different colours only','a continuous loud noise that never changes','only letters of the alphabet written on paper'],answer:0},{q:'A digital code uses ...',options:['only coloured light flashes in the dark','drum beats arranged in a long sequence','a pattern of 0s and 1s to carry information','only the 26 letters of the alphabet'],answer:2},{q:'Which TWO ways of using patterns can send information over a distance?',options:['Drum beats and flashes of light such as Morse code','Shadows on a wall and reflections in a pond','Ripples in a puddle and waves on a beach','A painted picture and a coloured poster on a wall'],answer:0},{q:'The moon looks bright at night but it is NOT a light source because ...',options:['it is too far away from Earth to produce light','it reflects light from the sun rather than making its own light','it is only visible during certain seasons of the year','it is much smaller than a torch'],answer:1},{q:'Why can drum beats carry information from one village to another?',options:['Because drums are very large and heavy objects','Because everyone enjoys the sound of music','Because drums are always louder than the human voice','Because the beat follows a pattern that stands for words or messages'],answer:3}],
 g4la:[{q:'What is a structure?',options:['A habitat where an animal lives','A body part that has a special job','The colour of a living thing','The food an animal eats'],answer:1},{q:'Which of the following is an EXTERNAL structure of a plant?',options:['Heart','Lungs','Thorn','Brain'],answer:2},{q:'What is the main job of roots in a plant?',options:['To take in water and anchor the plant in the soil','To make food from sunlight','To attract insects for pollination','To store seeds for reproduction'],answer:0},{q:'Which of the following is an INTERNAL structure of an animal?',options:['Feathers','Scales','Fins','Lungs'],answer:3},{q:'A fish uses its fins to...',options:['Breathe underwater','Keep warm in cold water','Steer and swim through water','Attract a mate'],answer:2},{q:'Which TWO of the following are external structures?',options:['Heart and lungs','Feathers and fins','Bones and stomach','Brain and kidneys'],answer:1},{q:'What does it mean to SURVIVE?',options:['To grow very tall','To change colour in winter','To find a new habitat','To stay alive and healthy in the environment'],answer:3},{q:'A fox has thick fur. This external structure mainly helps the fox...',options:['Stay warm in cold weather','Pump blood around the body','Make food from sunlight','Take in water from the soil'],answer:0},{q:'Which TWO of the following are INTERNAL structures of an animal?',options:['Wings and claws','Thorns and leaves','Heart and stomach','Scales and feathers'],answer:2},{q:'Why do living things need both internal AND external structures?',options:['To make them look attractive to scientists','Each type does different jobs that together help the organism survive','Internal structures are for plants only and external ones are for animals only','Only external structures matter for survival'],answer:1}],
 g4lb:[{q:'Which organ gives us the sense of SIGHT?',options:['Ears','Nose','Eyes','Skin'],answer:2},{q:'What is a SIGNAL in the sense-to-response pathway?',options:['A message sent from a sense organ to the brain','A loud sound made by an animal','The way the brain stores memories','A movement made by a muscle'],answer:0},{q:'A dog hears a sound. What is the CORRECT order of events?',options:['Brain decides then ears detect then dog responds','Dog responds then brain decides then ears detect','Signal travels to ears then dog responds then brain decides','Ears detect sound then signal travels to brain then dog responds'],answer:3},{q:'Which sense organ detects SMELL?',options:['Ears','Nose','Skin','Eyes'],answer:1},{q:'What does the BRAIN do when it receives a signal from a sense organ?',options:['It sends the signal back to the sense organ','It creates a new sense organ','It processes the information and decides how to respond','It stores the signal until the animal sleeps'],answer:2},{q:'Which TWO of the following are sense organs?',options:['Heart and lungs','Eyes and ears','Roots and leaves','Bones and muscles'],answer:1},{q:'Which sense organ does a dog use to hear an approaching car?',options:['Eyes','Nose','Skin','Ears'],answer:3},{q:'Why is it important for animals to RESPOND to signals from their sense organs?',options:['So they can survive by avoiding danger and finding food','So they can grow taller faster','So they can change colour to hide','So they can make more sense organs'],answer:0},{q:'A person touches a hot pan. What happens SECOND in the sequence?',options:['The hand pulls away','The skin detects heat','A signal travels from the skin to the brain','The brain sends a signal to the muscles'],answer:2},{q:'Which TWO of the following statements about the sense-brain-respond pathway are TRUE?',options:['The eyes and ears share one signal to the brain','Sense organs collect information and the brain processes it to decide a response','Signals travel directly from sense organs to muscles with no brain involved','The brain only receives signals when an animal is in danger'],answer:1}],
 g4sa:[{q:'Which rock layer is the oldest?',options:['The top layer','The middle layer','The bottom layer','All layers are the same age'],answer:2},{q:'What is a fossil?',options:['The remains of a plant or animal preserved in rock','A type of volcanic rock','A layer of sand','A very hard crystal'],answer:0},{q:'Where does the youngest rock layer form?',options:['At the bottom','At the top','In the middle','Underground'],answer:1},{q:'A scientist finds a sea-shell fossil high on a mountain. What does this tell us?',options:['The shell was carried there by a bird','Animals once climbed mountains','The mountain was once under the ocean','The shell grew inside a tree'],answer:2},{q:'Which TWO things can a fossil tell us about the past?',options:['The color of the sky long ago','What plants or animals lived there AND what the environment was like','How hot the sun was','How fast the Earth spins'],answer:1},{q:'Rock layers form over...',options:['a very long time — millions of years','one rainy season','a few weeks','one year'],answer:0},{q:'Why are rock layers important to scientists?',options:['They are used to make buildings','They show a record of Earth history','They make soil for farming','They are always the same color'],answer:1},{q:'Which is the best example of EVIDENCE in science?',options:['A guess','A wish','A dream','A fossil found in a rock layer'],answer:3},{q:'Which TWO statements about rock layers are correct?',options:['New layers form on top AND older layers are below','Younger layers are always at the bottom','All layers form at the same time','Fossils are never found in rock layers'],answer:0},{q:'What does it mean if two fossils are found in the SAME rock layer?',options:['One fossil is much older than the other','They lived around the same time','One was buried far deeper','They cannot be from the same place'],answer:1}],
 g4sb:[{q:'What is weathering?',options:['When water carries rock pieces to a new place','When a fossil forms inside rock','When wind, water or ice slowly breaks rock into smaller pieces','When lava cools and hardens'],answer:2},{q:'What is erosion?',options:['When water, wind or ice carry rock pieces to a new place','When rock breaks apart into smaller pieces','When fossils form in rock layers','When a glacier melts'],answer:0},{q:'Which of these is an example of EROSION?',options:['Frost cracking a rock apart','A river carrying sand downstream','Plant roots splitting rock','Rain soaking into soil'],answer:1},{q:'A river carves a valley over millions of years. This is an example of...',options:['weathering only','rock layer formation','fossilisation','erosion by water'],answer:3},{q:'Which TWO forces cause weathering?',options:['Sunlight and gravity','Wind and water breaking rock into pieces AND ice cracking rock apart','Erosion and maps','Rivers carrying sand downstream'],answer:1},{q:'Why do changes to the land happen slowly?',options:['Scientists do not want them to happen fast','Water and wind are not strong','Only ice causes change','The forces are strong but rock is hard — it takes a very long time'],answer:3},{q:'What does a map show?',options:['Earth features such as mountains, rivers and coastlines','Only the sky and clouds','How old the rock layers are','Where fossils are hidden'],answer:0},{q:'Which landform is carved by a river over a long time?',options:['A volcano','A fossil','A valley','A glacier'],answer:2},{q:'Which TWO statements about erosion are correct?',options:['Erosion happens very fast AND it only happens in deserts','Erosion moves rock pieces to a new place AND it is caused by water, wind or ice','Erosion builds up rock layers AND it creates fossils','Erosion is the same as weathering AND it only affects mountains'],answer:1},{q:'Which material is carried away most easily by water?',options:['Loose sand','Large boulders','Solid granite rock','Hard clay'],answer:0}],
 g4na:[{q:'What is a natural resource?',options:['Something from Earth that people use','A machine that makes electricity','Something made in a factory','A type of pollution'],answer:0},{q:'Which energy source is RENEWABLE?',options:['Coal','Wind','Oil','Natural gas'],answer:1},{q:'What harmful substance is released when coal or oil is burned?',options:['Clean water','Recycled air','Fresh oxygen','Pollution'],answer:3},{q:'Why do scientists say coal will run out one day?',options:['Coal is not useful','Coal is made by factories','It takes millions of years to form underground','Coal does not burn'],answer:2},{q:'Which word means a resource that nature can replace quickly?',options:['Renewable','Non-renewable','Pollution','Fossil fuel'],answer:0},{q:'Which action BEST helps protect natural resources?',options:['Burning more oil','Leaving lights on all day','Using more plastic','Recycling paper and glass'],answer:3},{q:'Which TWO are non-renewable energy sources?',options:['Sunlight and wind','Coal and oil','River water and wind','Sunlight and gas'],answer:1},{q:'A car burns petrol to move. What harmful effect does this have?',options:['It makes trees grow faster','The road becomes cleaner','Pollution is released into the air','Rivers fill with fresh water'],answer:2},{q:'Which of these is an example of recycling?',options:['Turning old paper into new paper','Burning plastic bags','Leaving food waste in the street','Using more electricity'],answer:0},{q:'Which TWO energy sources will NOT run out?',options:['Coal and oil','Gas and coal','Sunlight and wind','Oil and sunlight'],answer:2}],
 g4nb:[{q:'What is a natural hazard?',options:['A type of weather forecast','A dangerous natural event that can harm people','A tool used by engineers','A material found underground'],answer:1},{q:'Which of these is a natural hazard?',options:['A broken bridge','A leaking pipe','A traffic accident','A volcanic eruption'],answer:3},{q:'What happens during an earthquake?',options:['Rocks under the ground shift and shake the surface','Heavy rain falls for many days','A volcano releases lava and ash','The sea level drops quickly'],answer:0},{q:'Who designs solutions to reduce the impact of natural hazards?',options:['Farmers','Librarians','Engineers','Pilots'],answer:2},{q:'What does a flood barrier do?',options:['It blocks rising water from reaching homes and roads','It makes it rain more','It warns people about volcanoes','It stops earthquakes from happening'],answer:0},{q:'A tsunami is triggered by...',options:['Very heavy rain','Strong winds at sea','A long dry season','An earthquake under the ocean'],answer:3},{q:'Which TWO events are natural hazards?',options:['A power cut and a road accident','A broken dam and a fire','A volcanic eruption and a flood','A leaking pipe and a fallen tree'],answer:2},{q:'What is the purpose of an early-warning system for hazards?',options:['To rebuild homes after a disaster','To alert people so they can evacuate before a hazard hits','To stop all natural hazards from occurring','To design stronger buildings'],answer:1},{q:'Why do engineers build earthquake-proof buildings?',options:['To make buildings look more modern','To grow food more efficiently','To recycle water more easily','To reduce the harm caused if an earthquake strikes'],answer:3},{q:'Which TWO solutions can engineers use to reduce the impact of floods?',options:['Building sea walls and planting crops','Dams and flood barriers','Evacuation signs and solar panels','Volcanoes and rivers'],answer:1}],
 g3fa:[{q:'What is a force?',options:['The weight of an object','A push or a pull','The speed of an object','The direction of motion'],answer:1},{q:'A ball is sitting still. What must happen to make it start moving?',options:['An unbalanced force must act on it','It warms up on its own','Balanced forces push it equally','Gravity switches off'],answer:0},{q:'Two teams pull a rope with the same strength. What happens to the rope?',options:['One team falls over','The rope snaps in the middle','The rope does not move','Both teams speed up'],answer:2},{q:'Which of these is NOT a force?',options:['A push','A pull','Gravity pulling down','The colour red'],answer:3},{q:'Unbalanced forces make an object...',options:['change its motion','stay perfectly still','lose its weight','become warmer'],answer:0},{q:'A swing moves back and forth in a repeating pattern. This pattern helps us...',options:['change the direction of gravity','predict where the swing will be next','balance the forces on the swing','make the swing faster forever'],answer:1},{q:'Which TWO things can an unbalanced force do to an object?',options:['Change its colour and temperature','Change its weight and smell','Speed it up and change its direction','Make it invisible and heavier'],answer:2},{q:'A cart rolls along the floor and slows down by itself. What slowed it down?',options:['Balanced forces sped it up','A magnet pulled it backward','It ran out of stored force inside','An unbalanced force called friction acted on it'],answer:3},{q:'Forces are balanced when...',options:['one force is much bigger than the other','two equal forces push in opposite directions','there is only one force acting','all forces disappear'],answer:1},{q:'Which TWO things do we need to describe a force?',options:['Size and direction','Colour and weight','Temperature and shape','Smell and texture'],answer:0}],
 g3fb:[{q:'What is a magnet?',options:['An object that gives off heat','An object that pushes or pulls magnetic materials without touching','An object that only works when hot','An object made only of plastic'],answer:1},{q:'A paperclip jumps through the air toward a magnet without being touched. This is an example of...',options:['a force at a distance','a contact force','a balanced force','a pushing contact force'],answer:0},{q:'Which material is attracted by a magnet?',options:['Plastic','Wood','Glass','Steel'],answer:3},{q:'Two north poles of a magnet are brought close together. What happens?',options:['They attract each other','They stick together permanently','They repel each other','They do nothing at all'],answer:2},{q:'A north pole and a south pole are brought close together. They...',options:['repel each other','attract each other','both lose their magnetism','both become north poles'],answer:1},{q:'Which object would NOT be attracted by a magnet?',options:['An iron nail','A steel paperclip','A glass bottle','A steel spoon'],answer:2},{q:'A compass needle always points north because...',options:['the sun pulls it','the wind pushes it','heat rises in that direction','it contains a small magnet'],answer:3},{q:'Which TWO materials would a magnet attract?',options:['Iron and steel','Wood and plastic','Plastic and glass','Fabric and paper'],answer:0},{q:'What does the word repel mean?',options:['To pull strongly toward','To attract tightly','To push away','To stick together forever'],answer:2},{q:'Which TWO statements about magnets are correct?',options:['Magnets must touch an object to attract it','Like poles repel and opposite poles attract','Like poles attract and opposite poles repel','Magnets are only made of plastic'],answer:1}],
 g3la:[{q:'What is a life cycle?',options:['The stages a living thing goes through from birth to death','The food a living thing eats','The place where a living thing lives','The colour of a living thing'],answer:0},{q:'What is the correct order of stages in a butterfly life cycle?',options:['Caterpillar, egg, pupa, adult butterfly','Egg, caterpillar, pupa, adult butterfly','Pupa, egg, caterpillar, adult butterfly','Adult butterfly, caterpillar, egg, pupa'],answer:1},{q:'A tadpole grows into a...',options:['caterpillar','butterfly','frog','chick'],answer:2},{q:'What is the first stage in a plant life cycle?',options:['adult plant','seedling','flower','seed'],answer:3},{q:'Which stage comes right AFTER the egg in a frog life cycle?',options:['tadpole','frog','caterpillar','pupa'],answer:0},{q:'What do ALL life cycles have in common?',options:['They all start as a seed','They all have exactly four stages','They all include birth, growth, reproduction and death','They all live in water'],answer:2},{q:'What does reproduction mean in a life cycle?',options:['growing bigger and stronger','making new living things of the same kind','dying at the end of life','hatching from an egg'],answer:1},{q:'Which TWO stages are found in ALL life cycles?',options:['pupa and tadpole','egg and seed','growth and reproduction','caterpillar and chick'],answer:2},{q:'A chicken starts life as an egg and grows into a hen. What is the hen?',options:['an adult that is able to reproduce','a young stage still growing','a seed stage','a pupa stage'],answer:0},{q:'Which TWO living things begin their life cycle as a tiny egg?',options:['plant and tree','butterfly and frog','seed and caterpillar','flower and tadpole'],answer:1}],
 g3lb:[{q:'What is a trait?',options:['A feature of a living thing such as fur colour or body shape','The food a living thing eats','The place where a living thing lives','The number of stages in a life cycle'],answer:0},{q:'Which of these is an example of an inherited trait in a dog?',options:['a wound from an injury','the colour of its fur','its weight due to how much it eats','how fast it runs after training'],answer:1},{q:'A plant gets little sunlight and grows shorter. This shows that...',options:['all plants grow to the same height','the plant is reproducing','the environment can affect how a living thing grows','the plant has a new inherited trait'],answer:2},{q:'What does the word offspring mean?',options:['an adult that can reproduce','a trait that is inherited','a stage in the life cycle','the young of a living thing'],answer:3},{q:'Which statement about offspring is TRUE?',options:['Offspring are similar to their parents but not exactly the same','Offspring are identical to their parents','Offspring do not share any traits with their parents','Offspring are always smaller than their parents'],answer:0},{q:'A puppy living in a cold place grows a thicker coat than its sister kept indoors. The thicker coat is most likely...',options:['an inherited trait','caused by reproduction','shaped by the environment','a new life cycle stage'],answer:2},{q:'What does it mean to inherit a trait?',options:['to change a trait because of the environment','to receive a feature from your parents','to grow bigger with good food','to learn a skill through practice'],answer:1},{q:'Which TWO of these are examples of inherited traits?',options:['plant height due to lack of water and animal weight due to little food','fur colour in a dog and petal colour in a flower','a person learning to swim and a plant bending toward light','animal size due to food and plant size due to soil'],answer:1},{q:'A kitten has the same eye colour as its mother. This is because the kitten...',options:['inherited the eye colour from its parent','grew in the same environment','learned the trait','ate the same food'],answer:0},{q:'Which TWO of these show the environment affecting a trait?',options:['fur colour and eye colour','wing shape and body size at birth','petal colour and coat pattern','a plant growing shorter with less water and an animal growing smaller with less food'],answer:3}],
 g3aa:[{q:'What is an adaptation?',options:['A body part or behaviour that helps a living thing survive where it lives','The food that an animal eats each day','The colour of an animals fur or skin','The size of an animals habitat'],answer:0},{q:'Why does a camel have long eyelashes?',options:['To see better in the dark','To keep sand out of its eyes in the desert','To scare away predators','To help it find water underground'],answer:1},{q:'What does the word survive mean?',options:['To sleep all winter long','To grow very tall very fast','To stay alive and healthy in a habitat','To find a completely new home far away'],answer:2},{q:'A polar bear has thick fur and a layer of fat called blubber. These adaptations help it...',options:['run very fast across ice','breathe underwater for a long time','hide from other large animals','stay warm in icy cold places'],answer:3},{q:'A frog is green and hard to see when it sits on leaves. This is an example of...',options:['camouflage','blubber','a habitat','a fossil'],answer:0},{q:'A fish has gills instead of lungs. What do gills help a fish do?',options:['Swim faster than all other animals','Breathe underwater','Keep its body warm in cold water','Hide from predators in the dark'],answer:1},{q:'A cactus has a thick stem that stores water. Where does this adaptation help the cactus survive?',options:['In a cold snowy forest','In a deep dark ocean','In a hot dry desert','In a cool rainy rainforest'],answer:2},{q:'In a habitat some organisms survive well and others cannot survive at all. What decides this?',options:['The size of the organism','The age of the organism','The colour of the organism','Whether the organism has adaptations that suit the habitat'],answer:3},{q:'Which TWO adaptations help a polar bear survive in the cold Arctic?',options:['Webbed feet and gills','Thick fur and a fat layer called blubber','Long eyelashes and large humps','Sharp spines and a thick water-storing stem'],answer:1},{q:'Which TWO features help a duck survive in and around water?',options:['Humps that store fat and a blubber layer','Gills that breathe underwater and scales','Webbed feet for swimming and feathers that keep water out','Spines for protection and green camouflage colours'],answer:2}],
 g3ab:[{q:'What is a fossil?',options:['The preserved shape or print of a living thing found in rock','A type of shiny mineral found deep underground','An animal that lives in a deep cave','A large seed buried in soft soil'],answer:0},{q:'What does the word extinct mean?',options:['Moving to a different habitat to survive','When all living things of one kind have died out forever','Changing body parts slowly to survive in a new place','Finding a new source of food during winter'],answer:1},{q:'Scientists find a sea-shell fossil high on a mountain. What is the most likely explanation?',options:['Sea shells can grow in cold high places','Birds carry shells to the tops of mountains','That mountain area was once covered by the sea','Mountains are always formed from sea shells'],answer:2},{q:'Why are fossils important to scientists?',options:['They are colourful and easy to put on display','They are found in every backyard around the world','They are made from rare metals deep in the earth','They are evidence of what lived long ago and what the environment was like'],answer:3},{q:'A fern fossil is found in a place that is now cold and icy. What does this tell us?',options:['That place was once warm enough for ferns to grow','Ferns can grow in ice and snow today','Someone moved the fossil there to trick scientists','Ferns slowly turn into rock over time'],answer:0},{q:'When an environment changes, what three choices do living things have?',options:['Eat more grow bigger and sleep for longer','Adapt to the change move to a better place or die out and become extinct','Change colour grow taller and eat less food','Run faster dig deeper holes and drink more water'],answer:1},{q:'Which word means everything around a living thing including air water land and other living things?',options:['Fossil','Adaptation','Environment','Camouflage'],answer:2},{q:'Which of these is NOT a fossil?',options:['A fish shape pressed into rock','A dinosaur bone found in rock','A leaf print found in stone','A live fish swimming in a pond today'],answer:3},{q:'Which TWO things can scientists learn from fossils?',options:['What colour dinosaurs were and how loud they called','What animals lived long ago and what the environment was like then','How fast ancient animals could run and what they ate each day','How old mountains are and how deep the oceans go'],answer:1},{q:'Dinosaurs lived long ago but there are no dinosaurs alive today. We say dinosaurs are...',options:['adapted','camouflaged','extinct','fossilised'],answer:2}],
 g3wa:[{q:'What is weather?',options:['the typical weather over many years','the time of year like summer or winter','a type of recording chart','what the sky and air are doing right now'],answer:3},{q:'Which tool measures how hot or cold the air is?',options:['a thermometer','a rain gauge','a ruler','a graph'],answer:0},{q:'What do we call the typical weather of a place over many years?',options:['weather','season','temperature','climate'],answer:3},{q:'Which season is usually the coldest?',options:['summer','winter','spring','autumn'],answer:1},{q:'A desert is hot and dry all year. This describes its...',options:['season','temperature','climate','weather today'],answer:2},{q:'Which TWO tools would scientists use at a weather station?',options:['a thermometer and a rain gauge','a microscope and a magnet','a scale and a ruler','a clock and a pencil'],answer:0},{q:'We record weather data in tables and graphs so we can...',options:['change the weather','make the seasons go faster','grow plants faster','spot patterns and describe climate'],answer:3},{q:'What does a rain gauge measure?',options:['wind speed','how much rain has fallen','air temperature','cloud size'],answer:1},{q:'Which place is most likely to have a cold and snowy climate?',options:['a hot desert','a tropical rain forest','a polar region near the North Pole','a warm sandy beach'],answer:2},{q:'Which TWO words best describe the climate of a very dry hot region?',options:['hot and dry','cold and icy','wet and windy','cloudy and rainy'],answer:0}],
 g3wb:[{q:'What is a weather hazard?',options:['a sunny day in summer','dangerous weather that can harm people or places','a tool used to measure wind','the typical weather of a place'],answer:1},{q:'What causes a flood?',options:['too little sunshine','very cold temperatures','strong winds blowing sand','too much rain that covers the land'],answer:3},{q:'A drought happens when...',options:['there is very little rain for a long time','the wind blows very hard','lightning strikes a building','the temperature drops below zero'],answer:0},{q:'Which solution helps protect a building from lightning?',options:['a rain gauge','a flood barrier','a lightning rod','a warm coat'],answer:2},{q:'Which of these is an example of a weather hazard?',options:['a gentle breeze','a tornado','a cloudy sky','a warm sunny day'],answer:1},{q:'Engineers design solutions to weather hazards in order to...',options:['stop the weather from happening','make the seasons change faster','make more rain fall','reduce the harm caused by weather hazards'],answer:3},{q:'Which TWO things would help protect people during a heatwave?',options:['drinking water and resting in the shade','building a lightning rod and a storm shelter','planting trees in a snow field','recording rainfall on a graph'],answer:0},{q:'What is a storm?',options:['a long time without any rain','a gentle warm breeze','very strong winds with heavy rain or snow','sunshine after a rainy day'],answer:2},{q:'Why do communities build flood barriers?',options:['to make rivers flow faster','to keep flood water away from homes and towns','to measure how much rain falls','to make more water for plants'],answer:1},{q:'Which TWO things can engineers design to reduce the impacts of weather hazards?',options:['storm shelters and warning systems','rain gauges and thermometers','seasons and climate','graphs and tables'],answer:0}],
m2:[
  {q:"What does a solid do when you put it into a different container?",options:["It flows to fill the container","It keeps its own shape","It becomes a liquid","It disappears"],answer:1},
  {q:"Which word best describes something that can bend without breaking?",options:["Rigid","Heavy","Flexible","Transparent"],answer:2},
  {q:"What happens when you pour water into a bowl?",options:["The water keeps a fixed shape","The water takes the shape of the bowl","The water turns into a solid","The water disappears"],answer:1},

  {q:"Which of these is the BEST example of a rigid solid?",options:["A rubber band","A piece of clay","A building block","A wet cloth"],answer:2},

],
m3:[
  {q:"What is a claim in science?",options:["A tool used for measuring","A statement that can be tested","A drawing of an experiment","A type of material"],answer:1},
  {q:"A student says honey is hard to classify because it flows slowly. What type of information is this?",options:["A claim","A question","Evidence","A hypothesis"],answer:2},

  {q:"A student tests whether sand is a solid or a liquid. She pours it and watches it flow. What step is she doing?",options:["Writing a conclusion","Making a claim","Gathering evidence","Ignoring the experiment"],answer:2},
  {q:"Quicksand is hard to classify because it acts like both a solid and a liquid. What does this show about the claim that every material is a solid or a liquid?",options:["The claim is definitely true","The claim may need to be reconsidered","The claim does not need evidence","The claim is about liquids only"],answer:1},
  {q:"Which step comes LAST in testing a claim?",options:["Making an observation","Writing a claim","Conducting a test","Writing a conclusion"],answer:3},
  {q:"Toothpaste flows when squeezed but holds its shape in a tube. Why is it difficult to classify?",options:["It has a strong smell","It is transparent","It shows properties of both solids and liquids","It is always cold"],answer:2}
],

s2l2:[
  {q:"What is a fair test?",options:["A test where you change everything at once","A test where only one thing is changed and everything else stays the same","A test done without any planning","A test that always gives the same answer"],answer:1},

f1:[

f2:[

f3:[
  {q:"What is a claim?",options:["Something you observe happening in an experiment","A statement that tells what you think is true","A table where you record results","A type of force like gravity"],answer:1},
  {q:"What is evidence?",options:["A guess you make before an experiment","A statement about what you believe","Observations that support a claim","A question you ask at the start"],answer:2},

  {q:"A student says: the ball fell when I let go of it. Is this a claim or evidence?",options:["A claim, because it tells what they believe","Evidence, because it is an observation of what happened","Neither, it is just a question","A prediction, because it happened before the test"],answer:1},
  {q:"Which of the following is NOT evidence of gravity?",options:["Rain falls to the ground","Leaves fall from trees","A magnet attracts a paper clip","A ball falls when released"],answer:2},

],
e1:[
  {q:"What is the main source of energy for living things on Earth?",options:["The Moon","The Sun","Wind","Water"],answer:1},
  {q:"What do we call a living thing that makes its own food using sunlight?",options:["Consumer","Predator","Producer","Herbivore"],answer:2},
  {q:"What is the process plants use to make their own food?",options:["Digestion","Respiration","Pollination","Photosynthesis"],answer:3},
  {q:"Where is the energy from the Sun stored after a plant makes food?",options:["In the soil","In the air","In the food the plant makes","In the roots only"],answer:2},
  {q:"Why can animals not make their own food?",options:["They do not need energy","They cannot use sunlight to make food","They live underground","They eat too much"],answer:1},
  {q:"A rabbit eats grass to get energy. Where did that energy originally come from?",options:["The rabbit itself","The soil","Rain","The Sun"],answer:3},
  {q:"Which of the following is an example of a producer?",options:["A fox","A rabbit","A green plant","A frog"],answer:2},
  {q:"What happens to solar energy inside a plant during photosynthesis?",options:["It is lost into the air","It is stored in the food the plant makes","It is sent to animals directly","It is turned into water"],answer:1},
  {q:"An animal gets energy by eating a plant. The energy in that plant came from which source?",options:["The animal that ate it before","Another plant","The Sun","The ground"],answer:2},
  {q:"Which statement best describes what all living things have in common about their energy?",options:["All living things make their own food","All living things get energy that started as energy from the Sun","All living things get energy from the soil","All living things get energy from rain"],answer:1}
],
e2:[
  {q:"What does a food chain show?",options:["How animals find water","How energy passes from one living thing to another","How plants grow in soil","How animals breathe"],answer:1},
  {q:"Where does most food chains begin?",options:["With a carnivore","With a predator","With the Sun and a producer","With a consumer"],answer:2},
  {q:"In a food chain, what direction do the arrows point?",options:["From the predator to the prey","From the largest animal to the smallest","In the direction energy flows, from eaten to eater","From the Sun to the soil"],answer:2},

  {q:"A fox eats a rabbit. What is the fox in this relationship?",options:["Prey","Producer","Herbivore","Predator"],answer:3},
  {q:"In the food chain: grass, rabbit, fox — what is the rabbit?",options:["A producer and a predator","A prey and a consumer","A producer and a herbivore","A predator only"],answer:1},
  {q:"What do we call an animal that eats other animals?",options:["Herbivore","Producer","Carnivore","Prey"],answer:2},
  {q:"Which of these is a correctly written food chain?",options:["Fox, rabbit, grass, Sun","Sun, fox, grass, rabbit","Sun, grass, rabbit, fox","Rabbit, grass, Sun, fox"],answer:2},
  {q:"In a food chain, the rabbit is eaten by the fox. What is the rabbit called in this relationship?",options:["Predator","Producer","Carnivore","Prey"],answer:3}
],
e3:[
  {q:"What is the purpose of building a model of an energy chain?",options:["To show how animals drink water","To show how energy moves from the Sun to animals","To show how plants grow faster","To show how soil is formed"],answer:1},
  {q:"A child runs in a race and uses energy. Where did that energy originally come from?",options:["The child made the energy","The air around the child","The Sun","The water the child drank"],answer:2},
  {q:"What do we call the movement of energy from one living thing to another?",options:["Digestion","Energy transfer","Photosynthesis","Respiration"],answer:1},
  {q:"Bread is made from wheat. Wheat is a plant. What does this tell us about the energy in bread?",options:["The energy in bread came from the baker","The energy in bread came from water","The energy in bread originally came from the Sun","The energy in bread came from the oven"],answer:2},
  {q:"Which of these correctly traces the energy a child gets from eating bread?",options:["Child, bread, wheat, Sun","Sun, wheat, bread, child","Bread, child, Sun, wheat","Wheat, Sun, bread, child"],answer:1},
  {q:"What are THREE things animals use energy for, according to the lesson?",options:["Sleeping, digesting, and drinking","Moving, growing, and body functions","Eating, resting, and cooling down","Swimming, flying, and running only"],answer:1},
  {q:"If you trace the energy a lion uses backwards along the chain, what is always at the very start?",options:["A large animal","Rain","The Moon","The Sun"],answer:3},
  {q:"What does the word transfer mean when we talk about energy in a food chain?",options:["Energy is destroyed","Energy moves from one thing to another","Energy appears from nowhere","Energy stays in one place forever"],answer:1},
  {q:"Why is it useful to model the path of energy from the Sun to an animal?",options:["It helps us understand where the energy originally came from","It shows animals how to find food","It proves that plants do not need sunlight","It shows that energy comes from soil"],answer:0},
  {q:"Which statement correctly describes how energy reaches an animal like a cow?",options:["The cow gets energy directly from the Sun without eating","The cow gets energy by eating grass, which got its energy from the Sun","The cow gets energy from the soil through its hooves","The cow makes its own energy inside its body"],answer:1}
],
ms4a:[
  {q:"Which tool do scientists use to measure weight?",options:["A ruler","A thermometer","A scale or balance","A magnifying glass"],answer:2},
  {q:"An ice cube is placed inside a sealed bag and left to melt. What happens to the total weight of the bag?",options:["It increases because water is heavier than ice","It stays the same","It decreases because ice melts away","It changes depending on the temperature"],answer:1},
  {q:"Why does the weight stay the same when ice melts inside a sealed bag?",options:["Ice and water weigh different amounts","Nothing leaves the bag, so no matter is lost","The bag absorbs some of the water","Melting always adds extra weight"],answer:1},
  {q:"What does the word 'conservation of matter' mean?",options:["Matter disappears when it is heated","Matter can be created by cooling","Matter can change form but the total amount stays the same","Matter always becomes lighter when it melts"],answer:2},
  {q:"When you heat a solid and it turns into a liquid, what changes?",options:["The total weight increases","The total weight decreases","The form or state of the matter changes","The matter disappears"],answer:2},
  {q:"A scientist melts a block of wax in a closed container. Which statement is correct?",options:["The wax gains weight as it melts","The weight of the wax stays the same","The wax loses weight because it turns to liquid","The weight depends on how hot it gets"],answer:1},

  {q:"A student records the weight of an ice cube before and after melting. The numbers are the same. What does this show?",options:["The scale was broken","Some matter was destroyed","The student made a mistake","Weight is conserved when matter changes state"],answer:3},
  {q:"Which vocabulary word means to find out how heavy something is?",options:["Heat","Measure","Cool","Classify"],answer:1},
  {q:"Scientists often use graphs to share results. What is the main reason graphs are useful?",options:["They make experiments look more colourful","They help scientists avoid doing measurements","They show data clearly so others can understand the evidence","They replace the need for scales"],answer:2}
],
ms4b:[
  {q:"You measure 50 g of salt and 200 g of water and mix them together. What is the total weight of the mixture?",options:["Less than 250 g","Exactly 250 g","More than 250 g","Impossible to know"],answer:1},
